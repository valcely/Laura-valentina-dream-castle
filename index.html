<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="referrer" content="no-referrer">
  
  <title>Laura Valentina ✨ Dream Castle Adventure</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --p-pink: #ff85c2;
      --d-pink: #f72585;
      --l-purple: #c77dff;
      --gold: #ffd700;
      --bg-dark: #100010;
      --panel-bg: rgba(20, 0, 20, 0.85);
      --text: #ffffff;
      --font-main: 'Poppins', sans-serif;
      --font-fancy: 'Dancing Script', cursive;
    }

    body, html {
      margin: 0; padding: 0;
      background-color: var(--bg-dark);
      font-family: var(--font-main);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    * { box-sizing: border-box; outline: none; }

    /* Scrollbar Customizada */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: var(--l-purple); border-radius: 3px; }

    /* Animações */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 15px var(--gold); } 50% { text-shadow: 0 0 30px var(--p-pink), 0 0 10px var(--gold); } }
    @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(247, 37, 133, 0); } 100% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0); } }
    @keyframes twinkle { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }

    .page-enter { animation: fadeIn 0.5s ease-out forwards; }
    .float { animation: float 3s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }

    button { cursor: pointer; border: none; font-family: var(--font-main); transition: all 0.2s; }
    button:active { transform: scale(0.96); }

    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* Estilos base para assets visuais */
    .visual-asset {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 10px;
    }

    /* NOVO: Fundo de Estrelas Puro CSS */
    .stars-bg {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1; pointer-events: none;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #ffd700, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #ff85c2, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #c77dff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkle 4s infinite ease-in-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- DADOS E CONFIGURAÇÕES ---
    const vars = { 
      pPink: '#ff85c2', dPink: '#f72585', lPurple: '#c77dff', 
      gold: '#ffd700', text: '#ffffff',
      fontMain: "'Poppins', sans-serif", fontFancy: "'Dancing Script', cursive",
      panelBg: "rgba(20, 0, 20, 0.85)"
    };

    const BARBIE_QUOTES = [
      "Você está incrível hoje!", "Vamos explorar o castelo mágico?",
      "Eu amo o seu estilo!", "Você pode ser tudo o que quiser ser.",
      "Que tal um novo penteado?", "Adoro colecionar estrelinhas com você!",
      "Pronta para mais uma aventura?"
    ];

    const CHARACTERS = [
      { id:"giovanna",  name:"Giovanna",  job:"Princesa Real",      img:"https://i.imgur.com/vHq49XU.png" },
      { id:"laura",     name:"Laura",     job:"Master Chef",       img:"https://i.imgur.com/v3W5KxL.png" },
      { id:"valentina", name:"Valentina", job:"Bombeira Corajosa", img:"https://i.imgur.com/G4nS23x.png" },
      { id:"lidiane",   name:"Lidiane",   job:"Astronauta",        img:"https://i.imgur.com/uT7Wj1v.png" },
      { id:"valcely",   name:"Valcely",   job:"Engenheira Civil",  img:"https://i.imgur.com/M6LgA7R.png" },
      { id:"vitoria",   name:"Vitória",   job:"Presidente",        img:"https://i.imgur.com/R8M4f4y.png" },
      { id:"ayla",      name:"Ayla",      job:"Veterinária",       img:"https://i.imgur.com/X4b5bV5.png" },
      { id:"isa",       name:"Isa",       job:"Pediatra",          img:"https://i.imgur.com/I5S5H0Z.png" },
      { id:"maria",     name:"Maria",     job:"Pop Star",          img:"https://i.imgur.com/w9N0m4K.png" },
    ];

    const HAIR_ASSETS = {
      Liso: "https://i.imgur.com/O6S7y28.png", Ondulado: "https://i.imgur.com/V7YqG5E.png",
      Cacheado: "https://i.imgur.com/w4oN3p5.png", Afro: "https://i.imgur.com/H1zM93Z.png",
      Curto: "https://i.imgur.com/vWb5Gj8.png", Chiquinha: "https://i.imgur.com/f9m4R4M.png"
    };
    const HAIR_STYLES = Object.keys(HAIR_ASSETS);
    const HAIR_COLORS = [
      {c:"#f5c542",l:"Loiro"},{c:"#8B4513",l:"Castanho"},{c:"#1a1a1a",l:"Preto"},
      {c:"#b22222",l:"Ruivo"},{c:"#f72585",l:"Rosa"},{c:"#c77dff",l:"Roxo"}
    ];

    const DRESS_ASSETS = [
      "https://i.imgur.com/S6M5SgE.png", "https://i.imgur.com/A6j5E8G.png",
      "https://i.imgur.com/U8E6f3P.png", "https://i.imgur.com/C4B3n2L.png",
      "https://i.imgur.com/R3S1X2M.png", "https://i.imgur.com/G5K2L1V.png",
    ];

    const SHOE_ASSETS = {
      "Scarpin Cristal": "https://i.imgur.com/M4w4K6F.png", "Sapatilha Ouro": "https://i.imgur.com/X1M5S7H.png",
      "Bota Fashion": "https://i.imgur.com/E3V6G4K.png", "Sandália Verão": "https://i.imgur.com/V3F5L7M.png",
      "Tênis Casual": "https://i.imgur.com/T4Y6N7H.png"
    };
    const SHOE_STYLES = Object.keys(SHOE_ASSETS);

    const MEMORY_ITEMS = [
      { id: 1, img: "https://i.imgur.com/f7jD0wX.png", type: 'coroa' }, { id: 2, img: "https://i.imgur.com/7H6N4Fw.png", type: 'sapato' },
      { id: 3, img: "https://i.imgur.com/E4G4C9W.png", type: 'anel' }, { id: 4, img: "https://i.imgur.com/C3M8B3D.png", type: 'bolsa' },
      { id: 5, img: "https://i.imgur.com/L1M4K2E.png", type: 'peixe' }, { id: 6, img: "https://i.imgur.com/M5G7S7A.png", type: 'baleia' },
      { id: 7, img: "https://i.imgur.com/R1T3V2C.png", type: 'colar' }, { id: 8, img: "https://i.imgur.com/W2S4A3B.png", type: 'golfinho'},
    ];

    const ARCADE_GAMES = [
      { id: 'run', title: 'Aventura no Jardim', cat: 'Ação', icon: '🏃‍♀️', unlocked: false, level: 2 },
      { id: 'quiz_m', title: 'Mistérios do Mar ✨', cat: 'Quiz', icon: '🧜‍♀️' },
      { id: 'quiz_u', title: 'Explorando o Universo 🚀', cat: 'Quiz', icon: '🌌' },
      { id: 'quiz_b', title: 'Histórias da Criação 📖', cat: 'Quiz (Bíblico)', icon: '🙏' },
      { id: 'climb', title: 'Escalada Real', cat: 'Habilidade', icon: '🧗‍♀️' },
      { id: 'puzzle', title: 'Quebra-Cabeça de Luxo', cat: 'Raciocínio', icon: '🧩' },
      { id: 'match3', title: 'Joias Mágicas Connect', cat: 'Raciocínio', icon: '💎' },
      { id: 'makeup', title: 'Salão de Maquiagem Mágica', cat: 'Criatividade', icon: '💄' }
    ];

    const shuffle = a => [...a].sort(()=>Math.random()-0.5);
    const speak = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.pitch = 1.2;
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
      }
    };

    const visualAssetStyle = { backgroundSize:"contain", backgroundPosition:"center", backgroundRepeat:"no-repeat" };

    function RealDoll({ char, hairS, hairC, dress, shoes, acc, crown, size="large", onClick }) {
      const scale = size === "large" ? 1 : 0.5;
      return (
        <div onClick={onClick} style={{
          position:"relative", width:280*scale, height:500*scale, 
          cursor: onClick ? "pointer" : "default", transition:"transform 0.3s ease",
          filter: "drop-shadow(0 10px 15px rgba(0,0,0,0.5))"
        }} className={onClick ? "doll-interactive" : ""}>
          
          <div style={{ position:"absolute", inset:0, backgroundImage:`url(${char.img})`, zIndex: 1, ...visualAssetStyle }}/>

          <div style={{
            position:"absolute", top:"-5%", left:"15%", width:"70%", height:"40%",
            backgroundImage:`url(${HAIR_ASSETS[hairS]})`, filter: `drop-shadow(0 0 2px ${hairC}aa)`, zIndex: 5, ...visualAssetStyle
          }}/>

          <div style={{ position:"absolute", top:"20%", left:"5%", width:"90%", height:"70%", backgroundImage:`url(${dress})`, zIndex: 3, ...visualAssetStyle }}/>
          <div style={{ position:"absolute", bottom:"-2%", left:"20%", width:"60%", height:"15%", backgroundImage:`url(${SHOE_ASSETS[shoes]})`, zIndex: 2, ...visualAssetStyle }}/>

          {crown && <div style={{position:"absolute", top:"-8%", left:"35%", width:"30%", height:"15%", backgroundImage:`url(https://i.imgur.com/W29F1Yf.png)`, zIndex: 6, ...visualAssetStyle}}/>}
          {acc && <div style={{position:"absolute", top:"18%", left:"30%", width:"40%", height:"10%", backgroundImage:`url(https://i.imgur.com/8Q6N4R4.png)`, zIndex: 4, ...visualAssetStyle}}/>}
        </div>
      );
    }

    const Swatch = ({c, img, selected, onClick, type="color"}) => (
      <div onClick={onClick} style={{
        width:45, height:45, borderRadius: type==="color"?"50%":"8px", 
        background: type==="color"?c:`url(${img})`, backgroundSize:"cover", backgroundPosition:"center",
        cursor:"pointer", border:`3px solid ${selected?vars.gold:'rgba(255,255,255,0.2)'}`,
        transform:selected?"scale(1.1)":"scale(1)", transition:"all 0.2s",
        boxShadow:selected?`0 0 15px ${vars.dPink}`:"none", flexShrink:0,
      }}/>
    );

    const Btn = ({active, onClick, children, icon, primary}) => (
      <button onClick={onClick} style={{
        background: active || primary ? `linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple})` : "rgba(255,255,255,0.06)",
        border: `1px solid ${active || primary ? vars.gold : 'rgba(255,179,217,0.3)'}`,
        borderRadius: 12, padding: primary?"14px 24px":"10px 16px", color: vars.text,
        fontSize: primary?15:13, fontWeight:"600", display:"flex", alignItems:"center", gap:8, justifyContent:"center",
        boxShadow: primary? `0 5px 15px rgba(247,37,133,0.4)`:"none", animation: primary? "pulseBtn 2s infinite" : "none"
      }}>{icon && <span>{icon}</span>}{children}</button>
    );

    const SectionTitle = ({t}) => <div style={{color:vars.gold, fontSize:11, letterSpacing:2, fontWeight:"700", textTransform:"uppercase", marginBottom:10, marginTop:18, borderBottom:`1px solid rgba(255,215,0,0.2)`, paddingBottom:4}}>{t}</div>;

    const BackgroundCasteloReais = () => (
      <div style={{
        position:"fixed", inset:0, zIndex:0,
        backgroundImage:`url(https://i.imgur.com/G5B5S7H.png)`, 
        backgroundSize:"cover", backgroundPosition:"center", filter:"blur(2px) brightness(0.7)"
      }}>
        <div style={{position:"absolute", bottom:"10%", left:"5%", width:120, height:120, backgroundImage:`url(https://i.imgur.com/X4b5bV5.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", animation:"float 4s infinite", opacity:0.8}} />
        <div style={{position:"absolute", top:"20%", right:"10%", width:80, height:80, backgroundImage:`url(https://i.imgur.com/I5S5H0Z.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", animation:"float 3s infinite", opacity:0.7}} />
      </div>
    );

    function RunnerGame({onClose, addPoints}) {
      const GAME_WIDTH = 380; const GAME_HEIGHT = 250; const LANE_Y = GAME_HEIGHT - 60; const BARBIE_X = 50;
      const [playing, setPlaying] = useState(false); const [score, setScore] = useState(0);
      const [barbieY, setBarbieY] = useState(LANE_Y); const [isJumping, setIsJumping] = useState(false);
      const [obstacles, setObstacles] = useState([]); const [gameSpeed, setGameSpeed] = useState(4);
      const [gameOver, setGameOver] = useState(false);
      const barbieYRef = useRef(LANE_Y);

      useEffect(() => { barbieYRef.current = barbieY; }, [barbieY]);

      const jump = useCallback(() => {
        if (!playing || isJumping || gameOver) return;
        setIsJumping(true);
        let jumpHeight = 0;
        const upInterval = setInterval(() => {
          if (jumpHeight >= 80) {
            clearInterval(upInterval);
            const downInterval = setInterval(() => {
              if (jumpHeight <= 0) {
                clearInterval(downInterval); setIsJumping(false); setBarbieY(LANE_Y);
              } else { jumpHeight -= 5; setBarbieY(LANE_Y - jumpHeight); }
            }, 20);
          } else { jumpHeight += 8; setBarbieY(LANE_Y - jumpHeight); }
        }, 20);
      }, [playing, isJumping, gameOver]);

      useEffect(() => {
        if (!playing || gameOver) return;
        const interval = setInterval(() => {
            setObstacles(prev => {
              const moved = prev.map(obs => ({...obs, x: obs.x - gameSpeed})).filter(obs => obs.x > -50);
              moved.forEach(obs => {
                if (obs.x > BARBIE_X && obs.x < BARBIE_X + 30) { 
                  if (barbieYRef.current + 50 > obs.y) { 
                    setGameOver(true); setPlaying(false); speak("Ops! Tente novamente.");
                  }
                }
              });
              return moved;
            });
            setScore(s => { const newScore = s + 1; if (newScore % 500 === 0) setGameSpeed(sp => sp + 1); return newScore; });
        }, 1000/60); 

        const spawnDelay = Math.max(600, 2000 - (gameSpeed * 100));
        const spawnInterval = setInterval(() => {
            const type = Math.random() > 0.5 ? 'pedra' : 'tronco';
            const img = type === 'pedra' ? "https://i.imgur.com/K1Y5S7H.png" : "https://i.imgur.com/E4G4C9W.png";
            setObstacles(prev => [...prev, { id: Date.now(), x: GAME_WIDTH + 50, y: LANE_Y + 10, w: 40, h: 40, img: img }]);
        }, spawnDelay);

        return () => { clearInterval(interval); clearInterval(spawnInterval); };
      }, [playing, gameOver, gameSpeed]);

      const startGame = () => { setScore(0); setObstacles([]); setGameSpeed(4); setGameOver(false); setPlaying(true); setBarbieY(LANE_Y); speak("Vamos correr!"); };
      const finishGame = () => { if (score > 10) { const pts = Math.floor(score / 100); addPoints(pts); speak(`Ganhou ${pts} estrelinhas!`); } onClose(); };

      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeIn 0.5s ease"}}>
          <div style={{color:vars.gold, fontSize:20, fontWeight:"700", marginBottom:10, fontFamily:vars.fontFancy}}>Aventura no Jardim 🏃‍♀️</div>
          <div style={{ width: GAME_WIDTH, height: GAME_HEIGHT, background:`url(https://i.imgur.com/G5F5S7H.png) bottom/cover`, borderRadius:16, position:"relative", overflow:"hidden", border:`4px solid ${vars.lPurple}` }}>
            <div style={{ position:"absolute", left: BARBIE_X, top: barbieY, width: 40, height: 60, backgroundImage:`url(https://i.imgur.com/vHq49XU.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", zIndex: 10, transform: gameOver ? "rotate(90deg)" : "none" }}/>
            {obstacles.map(obs => <div key={obs.id} style={{ position:"absolute", left: obs.x, top: obs.y, width: obs.w, height: obs.h, backgroundImage:`url(${obs.img})`, backgroundSize:"contain", backgroundRepeat:"no-repeat", zIndex: 5 }}/>)}
            <div style={{position:"absolute", bottom:0, left:0, width:"100%", height:20, background:"#4a2e00", zIndex:1}}/>
            {(!playing || gameOver) && (
              <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.7)", zIndex:20, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:15 }}>
                {gameOver && <div style={{color:"#ff4d6d", fontSize:24, fontWeight:"700"}}>Fim de Jogo!</div>}
                <div style={{color:vars.gold, fontSize:18, fontWeight:"600"}}>Pontos: {score}</div>
                <Btn primary onClick={startGame}>{gameOver ? "Jogar Novamente" : "Começar"}</Btn>
                {gameOver && <Btn onClick={finishGame}>Sair</Btn>}
              </div>
            )}
            {playing && <div style={{position:"absolute", top:10, right:15, color:vars.gold, fontWeight:"700", zIndex:15}}>⭐ {score}</div>}
          </div>
          <div style={{ display:"flex", gap:30, marginTop:20, justifyContent:"center", padding:15, background:"rgba(255,255,255,0.05)", borderRadius:50 }}>
            <button onClick={jump} style={{ width:80, height:80, borderRadius:"50%", background:`linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple})`, color:"#fff", fontSize:32, border:`3px solid ${vars.gold}` }}>⬆️</button>
          </div>
          {!playing && !gameOver && <button onClick={onClose} style={{marginTop:20, background:"transparent", color:vars.pPink}}>Voltar</button>}
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [char, setChar] = useState(null);
      const [level, setLevel] = useState(1);
      
      const [dress, setDress] = useState(DRESS_ASSETS[0]); const [hairC, setHairC] = useState(HAIR_COLORS[0].c);
      const [hairS, setHairS] = useState(HAIR_STYLES[0]); const [shoes, setShoes] = useState(SHOE_STYLES[0]);
      const [acc, setAcc] = useState(false); const [crown, setCrown] = useState(false);
      
      const [gallery, setGallery] = useState([]); const [points, setPoints] = useState(0);
      const [toast, setToast] = useState(""); const [tab, setTab] = useState("closet");
      
      const [memCards, setMemCards] = useState([]); const [memFlipped, setMemFlipped] = useState([]);
      const [memMatched, setMemMatched] = useState([]); const [memLock, setMemLock] = useState(false);
      
      const [musicOn, setMusicOn] = useState(false); const audioRef = useRef(null); const scrollRef = useRef(null);

      useEffect(() => {
        if (points >= 300 && level === 1) { setLevel(2); speak("Nível 2!"); showToast("🏆 NÍVEL 2 ALCANÇADO!"); }
      }, [points, level]);

      const toggleMusic = () => {
        if(!audioRef.current) return;
        if(musicOn) { audioRef.current.pause(); setMusicOn(false); }
        else { audioRef.current.play().catch(()=>console.log("Audio block")); setMusicOn(true); }
      };

      const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""), 3000); };
      const scrollTabs = (dir) => { if(scrollRef.current) scrollRef.current.scrollBy({ left: dir * 150, behavior: 'smooth' }); };

      const selectChar = (c) => {
        setChar(c); setDress(DRESS_ASSETS[0]); setHairS(HAIR_STYLES[0]); setHairC(HAIR_COLORS[0].c); setShoes(SHOE_STYLES[0]); setAcc(false); setCrown(false);
        setScreen("castle"); setTab("closet"); speak(`Olá! Eu sou a ${c.name}.`);
      };

      const saveLook = () => {
        setGallery(g => [{ id: Date.now(), char, dress, hairC, hairS, shoes, acc, crown }, ...g].slice(0, 10));
        setPoints(p => p + 15); showToast("📸 Look salvo! +15 estrelinhas");
      };

      const startMemory = () => {
        setMemCards(shuffle([...MEMORY_ITEMS, ...MEMORY_ITEMS]).map((it, i) => ({...it, uniqueId: i})));
        setMemFlipped([]); setMemMatched([]); setMemLock(false); setScreen("memory");
      };

      const flipCard = (index) => {
        if (memLock || memFlipped.includes(index) || memMatched.includes(memCards[index].id)) return;
        const newFlipped = [...memFlipped, index]; setMemFlipped(newFlipped);
        
        if (newFlipped.length === 2) {
          setMemLock(true);
          const [firstIdx, secondIdx] = newFlipped;
          if (memCards[firstIdx].id === memCards[secondIdx].id) {
            setMemMatched(m => [...m, memCards[firstIdx].id]); setPoints(p => p + 20); showToast("✨ Par encontrado! +20");
            setMemFlipped([]); setMemLock(false);
            if (memMatched.length + 1 === MEMORY_ITEMS.length) setTimeout(()=>setScreen("castle"), 2000);
          } else { setTimeout(() => { setMemFlipped([]); setMemLock(false); }, 1000); }
        }
      };

      const PanelStyle = { background: vars.panelBg, borderRadius: 24, padding: 20, width: "100%", maxWidth: 420, boxShadow: `0 15px 35px rgba(0,0,0,0.5)`, zIndex:1 };
      const TABS = [{k:"closet",l:"Closet 👗"},{k:"hair",l:"Salão ✂️"},{k:"sapatos",l:"Sapatos 👠"},{k:"games",l:"Jogos ⭐"},{k:"arcade",l:"Arcade 🕹️"},{k:"gallery",l:"Galeria 📸"}];

      return (
        <div style={{minHeight:"100vh", position:"relative"}}>
          <audio ref={audioRef} loop preload="auto"><source src="https://cdn.pixabay.com/download/audio/2024/03/15/audio_134567ac8d.mp3" type="audio/mpeg"/></audio>
          <div className="stars-bg"/>

          <div style={{position:"fixed", top:15, right:15, zIndex:100, display:"flex", alignItems:"center", gap:15}}>
            <div style={{background:vars.panelBg, padding:"8px 15px", borderRadius:20, color:vars.gold, fontWeight:"700", border:`1px solid ${vars.gold}44`}}>
              ⭐ {points} <span style={{fontSize:10, color:vars.pPink}}>(Nível {level})</span>
            </div>
            <button onClick={toggleMusic} style={{background:"rgba(247,37,133,0.3)", borderRadius:"50%", width:40, height:40, color:"white"}}>{musicOn ? "🎵" : "🔇"}</button>
          </div>

          {toast && <div style={{position:"fixed", top:70, left:"50%", transform:"translateX(-50%)", background:`linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple})`, color:"white", padding:"12px 25px", borderRadius:30, zIndex:1000}}>{toast}</div>}

          {screen === "home" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:20, textAlign:"center", position:"relative", zIndex:2}}>
              <div style={{position:"absolute", inset:0, backgroundImage:`url(https://i.imgur.com/G5B5S7H.png)`, backgroundSize:"cover", filter:"blur(3px) brightness(0.5)", zIndex:-1}}/>
              <div className="glow" style={{fontSize:60, marginBottom:10}}>🏰</div>
              <h1 className="glow" style={{fontFamily:vars.fontFancy, fontSize:"clamp(40px, 10vw, 64px)", color:vars.gold, margin:0}}>Laura Valentina</h1>
              <h2 style={{textTransform:"uppercase", letterSpacing:6, fontSize:16, color:vars.pPink, margin:"0 0 15px 0", fontWeight:"700"}}>Dream Castle</h2>
              <button className="float" onClick={()=>setScreen("select")} style={{padding:"20px 40px", borderRadius:50, background:`linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple}, ${vars.gold})`, color:"white", fontSize:18, fontWeight:"700", marginTop: 20}}>Entrar no Castelo Mágico</button>
            </div>
          )}

          {screen === "select" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 20px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              <div className="glow" style={{fontFamily:vars.fontFancy, color:vars.gold, fontSize:40, marginBottom:5}}>Escolha sua Boneca</div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(110px, 1fr))", gap:15, width:"100%", maxWidth:400, marginTop: 20}}>
                {CHARACTERS.map(c=>(
                  <div key={c.id} onClick={()=>selectChar(c)} style={{ background:vars.panelBg, border:`1px solid rgba(255,179,217,0.3)`, borderRadius:16, padding:15, cursor:"pointer", textAlign:"center"}}>
                    <div style={{width:"100%", height:120, backgroundImage:`url(${c.img})`, backgroundSize:"contain", backgroundPosition:"center", backgroundRepeat:"no-repeat", marginBottom:10}}/>
                    <div style={{color:vars.gold, fontWeight:"700", fontSize:14}}>{c.name}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setScreen("home")} style={{marginTop:30, background:"transparent", color:vars.pPink, border:`1px solid ${vars.dPink}`, padding:"10px 20px", borderRadius:20}}>Voltar</button>
            </div>
          )}

          {screen === "castle" && char && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"70px 15px 30px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              <RealDoll char={char} hairS={hairS} hairC={hairC} dress={dress} shoes={shoes} acc={acc} crown={crown} onClick={()=>showToast(BARBIE_QUOTES[0])} />
              
              <div style={PanelStyle}>
                <div style={{display:"flex", alignItems:"center", gap:5, marginBottom:15}}>
                  <button onClick={()=>scrollTabs(-1)} style={{background:"none", color:vars.gold}}>❮</button>
                  <div ref={scrollRef} className="hide-scroll" style={{display:"flex", gap:8, overflowX:"auto"}}>
                    {TABS.map(t => <button key={t.k} onClick={()=>setTab(t.k)} style={{ padding:"8px 16px", borderRadius:20, background: tab===t.k ? vars.dPink : "rgba(255,255,255,0.05)", color: "white" }}>{t.l}</button>)}
                  </div>
                  <button onClick={()=>scrollTabs(1)} style={{background:"none", color:vars.gold}}>❯</button>
                </div>

                <div style={{minHeight:200}}>
                  {tab === "closet" && (
                    <div className="page-enter">
                      <SectionTitle t="Vestidos Reais" />
                      <div style={{display:"flex", gap:10, overflowX:"auto"}} className="hide-scroll">
                        {DRESS_ASSETS.map(img => <Swatch key={img} type="img" img={img} selected={dress===img} onClick={()=>setDress(img)} />)}
                      </div>
                      <SectionTitle t="Acessórios Brilhantes" />
                      <div style={{display:"flex", gap:10}}><Btn active={crown} onClick={()=>setCrown(!crown)} icon="👑">Coroa</Btn></div>
                    </div>
                  )}

                  {tab === "hair" && (
                    <div className="page-enter">
                      <SectionTitle t="Penteados Dinâmicos" />
                      <div style={{display:"flex", gap:10, overflowX:"auto"}} className="hide-scroll">
                        {HAIR_STYLES.map(style => <Swatch key={style} type="img" img={HAIR_ASSETS[style]} selected={hairS===style} onClick={()=>setHairS(style)} />)}
                      </div>
                      <SectionTitle t="Cor do Cabelo" />
                      <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
                        {HAIR_COLORS.map(color => <Swatch key={color.c} type="color" c={color.c} selected={hairC===color.c} onClick={()=>setHairC(color.c)} />)}
                      </div>
                    </div>
                  )}

                  {tab === "sapatos" && (
                    <div className="page-enter">
                      <SectionTitle t="Sapatos" />
                      <div style={{display:"flex", gap:10, overflowX:"auto"}} className="hide-scroll">
                        {SHOE_STYLES.map(style => <Swatch key={style} type="img" img={SHOE_ASSETS[style]} selected={shoes===style} onClick={()=>setShoes(style)} />)}
                      </div>
                    </div>
                  )}

                  {tab === "games" && (
                    <div className="page-enter">
                      <SectionTitle t="Mini Jogos" />
                      <div style={{display:"flex", flexDirection:"column", gap:12}}>
                        <Btn onClick={startMemory} primary icon="🧩">Jogar Memória</Btn>
                        <Btn onClick={()=>level>=2 ? setScreen("runner") : showToast("Desbloqueia no Nível 2")} primary={level>=2} icon="🏃‍♀️">Corrida {level<2 && "🔒"}</Btn>
                      </div>
                    </div>
                  )}

                   {tab === "arcade" && (
                    <div className="page-enter">
                      <SectionTitle t="HUB de Jogos Arcade" />
                      <div style={{display:"flex", flexDirection:"column", gap:8, maxHeight:200, overflowY:"auto"}}>
                        {ARCADE_GAMES.map(g => <div key={g.id} style={{background:"rgba(255,255,255,0.05)", padding:10, borderRadius:8, display:"flex", justifyContent:"space-between"}}>{g.icon} {g.title}</div>)}
                      </div>
                    </div>
                  )}

                  {tab === "gallery" && (
                    <div className="page-enter">
                      <SectionTitle t="Meus Looks" />
                      <Btn onClick={saveLook} primary icon="📸">Salvar Look Atual</Btn>
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:10}}>
                        {gallery.map(lk => <div key={lk.id} style={{background:"rgba(255,255,255,0.1)", padding:10, borderRadius:8, textAlign:"center"}}>{lk.char.name} <button onClick={()=>setChar(lk.char)}>Usar</button></div>)}
                      </div>
                    </div>
                  )}
                </div>
              </div> 
              <button onClick={()=>setScreen("select")} style={{marginTop:30, background:"transparent", color:vars.pPink}}>Trocar Boneca</button>
            </div>
          )}

          {screen === "memory" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 15px", zIndex:2}}>
              <BackgroundCasteloReais />
              <div style={{fontFamily:vars.fontFancy, color:vars.gold, fontSize:36, marginBottom:20}}>Memory Match</div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:10, width:"100%", maxWidth:380}}>
                {memCards.map((card, index) => {
                  const isFlipped = memFlipped.includes(index) || memMatched.includes(card.id);
                  return (
                    <div key={card.uniqueId} onClick={()=>flipCard(index)} style={{ height:90, borderRadius:12, cursor:"pointer", position:"relative", transformStyle:"preserve-3d", transition:"transform 0.5s", transform: isFlipped ? "rotateY(180deg)" : "rotateY(0deg)" }}>
                      <div style={{ position:"absolute", inset:0, background:vars.lPurple, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", backfaceVisibility:"hidden" }}>💎</div>
                      <div style={{ position:"absolute", inset:0, background:`#fff url(${card.img}) center/contain no-repeat`, borderRadius:12, transform:"rotateY(180deg)", backfaceVisibility:"hidden" }}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex", gap:10, marginTop:30}}><Btn onClick={()=>setScreen("castle")}>Sair</Btn></div>
            </div>
          )}

          {screen === "runner" && (
             <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 15px", position:"relative", zIndex:2}}>
                <RunnerGame onClose={()=>setScreen("castle")} addPoints={(p)=>setPoints(prev=>prev+p)} />
             </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

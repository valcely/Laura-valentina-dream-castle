    :root {
      --p-pink: #ff85c2;
      --d-pink: #f72585;
      --l-purple: #c77dff;
      --gold: #ffd700;
      --bg-dark: #100010;
      --panel-bg: rgba(20, 0, 20, 0.85);
      --text: #ffffff;
      --font-main: 'Poppins', sans-serif;
      --font-fancy: 'Dancing Script', cursive;
    }

    body, html {
      margin: 0; padding: 0;
      background-color: var(--bg-dark);
      font-family: var(--font-main);
      color: var(--text);
      overflow-x: hidden;
      height: 100%;
    }

    * { box-sizing: border-box; outline: none; }

    /* Scrollbar Customizada */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: var(--l-purple); border-radius: 3px; }

    /* Animações */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 15px var(--gold); } 50% { text-shadow: 0 0 30px var(--p-pink), 0 0 10px var(--gold); } }
    @keyframes pulseBtn { 0% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(247, 37, 133, 0); } 100% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0); } }

    .page-enter { animation: fadeIn 0.5s ease-out forwards; }
    .float { animation: float 3s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }

    button { cursor: pointer; border: none; font-family: var(--font-main); transition: all 0.2s; }
    button:active { transform: scale(0.96); }

    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* Estilos base para assets visuais (simulando 3D/Real) */
    .visual-asset {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 10px;
    }
  </style>

    // --- JOGO DE CORRIDA (RUNNER) ---
    function RunnerGame({onClose, addPoints}) {
      const GAME_WIDTH = 380;
      const GAME_HEIGHT = 250;
      const LANE_Y = GAME_HEIGHT - 60;
      const BARBIE_X = 50;
      
      const [playing, setPlaying] = useState(false);
      const [score, setScore] = useState(0);
      const [barbieY, setBarbieY] = useState(LANE_Y);
      const [isJumping, setIsJumping] = useState(false);
      const [obstacles, setObstacles] = useState([]);
      const [gameSpeed, setGameSpeed] = useState(4);
      const [gameOver, setGameOver] = useState(false);
      
      const gameLoopRef = useRef();
      const obstacleTimerRef = useRef();

      // Controles
      const jump = useCallback(() => {
        if (!playing || isJumping || gameOver) return;
        setIsJumping(true);
        let jumpHeight = 0;
        const upInterval = setInterval(() => {
          if (jumpHeight >= 80) {
            clearInterval(upInterval);
            const downInterval = setInterval(() => {
              if (jumpHeight <= 0) {
                clearInterval(downInterval);
                setIsJumping(false);
                setBarbieY(LANE_Y);
              } else {
                jumpHeight -= 5;
                setBarbieY(LANE_Y - jumpHeight);
              }
            }, 20);
          } else {
            jumpHeight += 8;
            setBarbieY(LANE_Y - jumpHeight);
          }
        }, 20);
      }, [playing, isJumping, gameOver]);

      // Game Loop
      useEffect(() => {
        if (playing && !gameOver) {
          gameLoopRef.current = setInterval(() => {
            // Mover obstáculos
            setObstacles(prev => prev.map(obs => ({...obs, x: obs.x - gameSpeed})).filter(obs => obs.x > -50));
            
            // Checar Colisão
            obstacles.forEach(obs => {
              if (obs.x > BARBIE_X && obs.x < BARBIE_X + 30) { // Na região X da Barbie
                const bBottom = barbieY + 50;
                if (bBottom > obs.y) { // Colidiu verticalmente
                  setGameOver(true);
                  setPlaying(false);
                  speak("Ops! Tente novamente.");
                }
              }
            });

            // Aumentar score e velocidade
            setScore(s => {
              const newScore = s + 1;
              if (newScore % 500 === 0) setGameSpeed(sp => sp + 1);
              return newScore;
            });

          }, 1000/60); // 60 FPS

          // Gerador de obstáculos
          obstacleTimerRef.current = setInterval(() => {
            const type = Math.random() > 0.5 ? 'pedra' : 'tronco';
            const img = type === 'pedra' ? "https://i.imgur.com/K1Y5S7H.png" : "https://i.imgur.com/E4G4C9W.png";
            setObstacles(prev => [...prev, {
              id: Date.now(),
              x: GAME_WIDTH + 50,
              y: LANE_Y + 10,
              w: 40, h: 40, img: img
            }]);
          }, 2000 - (gameSpeed * 100)); // Aparecem mais rápido conforme velocidade

          return () => {
            clearInterval(gameLoopRef.current);
            clearInterval(obstacleTimerRef.current);
          };
        }
      }, [playing, gameOver, gameSpeed, obstacles, barbieY]);

      const startGame = () => {
        setScore(0);
        setObstacles([]);
        setGameSpeed(4);
        setGameOver(false);
        setPlaying(true);
        setBarbieY(LANE_Y);
        speak("Vamos correr!");
      };

      const finishGame = () => {
        if (score > 10) {
          const pts = Math.floor(score / 100);
          addPoints(pts);
          speak(`Parabéns! Você ganhou ${pts} estrelinhas.`);
        }
        onClose();
      };

      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",animation:"fadeIn 0.5s ease"}}>
          <div style={{color:vars.gold, fontSize:20, fontWeight:"700", marginBottom:10, fontFancy:vars.fontFancy}}>Aventura no Jardim 🏃‍♀️</div>
          
          {/* Tela do Jogo */}
          <div style={{
            width: GAME_WIDTH, height: GAME_HEIGHT, background:`url(https://i.imgur.com/G5F5S7H.png)`, // Cenário Jardim Real
            backgroundSize:'cover', backgroundPosition:'bottom', borderRadius:16, position:"relative",
            overflow:"hidden", border:`4px solid ${vars.lPurple}`, boxShadow:`0 0 20px rgba(0,0,0,0.8)`
          }}>
            {/* Barbie Correndo (Simulação PNG) */}
            <div style={{
              position:"absolute", left: BARBIE_X, top: barbieY, width: 40, height: 60,
              backgroundImage:`url(https://i.imgur.com/vHq49XU.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat",
              zIndex: 10, transition: "top 0.1s linear", transform: gameOver ? "rotate(90deg)" : "none"
            }}/>

            {/* Obstáculos */}
            {obstacles.map(obs => (
              <div key={obs.id} style={{
                position:"absolute", left: obs.x, top: obs.y, width: obs.w, height: obs.h,
                backgroundImage:`url(${obs.img})`, backgroundSize:"contain", backgroundRepeat:"no-repeat",
                zIndex: 5
              }}/>
            ))}

            {/* Chão */}
            <div style={{position:"absolute", bottom:0, left:0, width:"100%", height:20, background:"#4a2e00", zIndex:1}}/>

            {/* Overlay */}
            {(!playing || gameOver) && (
              <div style={{
                position:"absolute", inset:0, background:"rgba(0,0,0,0.7)", zIndex:20,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:15
              }}>
                {gameOver && <div style={{color:"#ff4d6d", fontSize:24, fontWeight:"700"}}>Fim de Jogo!</div>}
                <div style={{color:vars.gold, fontSize:18, fontWeight:"600"}}>Pontos: {score}</div>
                <Btn primary onClick={startGame}>{gameOver ? "Jogar Novamente" : "Começar Corrida"}</Btn>
                {gameOver && <Btn onClick={finishGame}>Sair</Btn>}
              </div>
            )}
            
            {/* Score HUD */}
            {playing && <div style={{position:"absolute", top:10, right:15, color:vars.gold, fontWeight:"700", zIndex:15, textShadow:"0 2px 4px #000"}}>⭐ {score}</div>}
          </div>

          {/* CONTROLES ORGANIZADOS NA PARTE INFERIOR */}
          <div style={{
            display:"flex", gap:30, marginTop:20, width:"100%", maxWidth:300, 
            justifyContent:"center", padding:15, background:"rgba(255,255,255,0.05)", borderRadius:50
          }}>
            <button style={{width:60, height:60, borderRadius:"50%", background:"#555", color:"#fff", fontSize:24, opacity:0.5, cursor:"not-allowed"}}>⬅️</button>
            <button onClick={jump} style={{

              color:"#fff", fontSize:32, boxShadow:`0 5px 15px rgba(247,37,133,0.5)`,
              border:`3px solid ${vars.gold}`
            }}>⬆️</button>
            <button style={{width:60, height:60, borderRadius:"50%", background:"#555", color:"#fff", fontSize:24, opacity:0.5, cursor:"not-allowed"}}>➡️</button>
          </div>

          {!playing && !gameOver && <button onClick={onClose} style={{marginTop:20, background:"transparent", color:vars.pPink}}>Voltar</button>}

      const [char, setChar] = useState(null);
      const [level, setLevel] = useState(1);
      
      // Closet State (Com Assets Reais)
      const [dress, setDress] = useState(DRESS_ASSETS[0]);
      const [hairC, setHairC] = useState(HAIR_COLORS[0].c);
      const [hairS, setHairS] = useState(HAIR_STYLES[0]);
      const [shoes, setShoes] = useState(SHOE_STYLES[0]);
      const [acc, setAcc] = useState(false);
      const [crown, setCrown] = useState(false);
      
      const [gallery, setGallery] = useState([]);
      const [points, setPoints] = useState(0);
      const [toast, setToast] = useState("");
      const [tab, setTab] = useState("closet");
      
      // Memory Game State
      const [memCards, setMemCards] = useState([]);
      const [memFlipped, setMemFlipped] = useState([]);
      const [memMatched, setMemMatched] = useState([]);
      const [memLock, setMemLock] = useState(false);
      
      const [musicOn, setMusicOn] = useState(false);
      const audioRef = useRef(null);
      const scrollRef = useRef(null);

      // Efeito para checar evolução de nível (300 estrelas)
      useEffect(() => {
        if (points >= 300 && level === 1) {
          setLevel(2);
          speak("Parabéns! Você evoluiu para o Nível 2 e desbloqueou o jogo de corrida!");
          showToast("🏆 NÍVEL 2 ALCANÇADO! Novo jogo liberado.");
        }
      }, [points, level]);

      const toggleMusic = () => {
        if(!audioRef.current) return;
        if(musicOn) { audioRef.current.pause(); setMusicOn(false); }
        else { audioRef.current.play().catch(e=>console.log("Audio block")); setMusicOn(true); }
      };

      const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""), 3000); };
      
      const scrollTabs = (dir) => { if(scrollRef.current) scrollRef.current.scrollBy({ left: dir * 150, behavior: 'smooth' }); };

      const selectChar = (c) => {
        setChar(c);
        // Reset look padrão para a personagem
        setDress(DRESS_ASSETS[0]); setHairS(HAIR_STYLES[0]); setHairC(HAIR_COLORS[0].c);
        setShoes(SHOE_STYLES[0]); setAcc(false); setCrown(false);
        setScreen("castle");
        setTab("closet");
        speak(`Olá! Eu sou a ${c.name}. Vamos nos arrumar no meu castelo?`);
      };

      const onDollClick = () => {
        const quote = BARBIE_QUOTES[Math.floor(Math.random() * BARBIE_QUOTES.length)];
        speak(quote);
        showToast(`💋 Barbie diz: "${quote}"`);
      };

      const saveLook = () => {
        const newLook = { id: Date.now(), char, dress, hairC, hairS, shoes, acc, crown };
        setGallery(g => [newLook, ...g].slice(0, 10));
        setPoints(p => p + 15);
        speak("Que look maravilhoso! Salvei na galeria.");
        showToast("📸 Look salvo! +15 estrelinhas");
      };

      // Memory Game Logic (Melhorado com Imagens)
      const startMemory = () => {
        // Criar pares e embaralhar
        const items = shuffle([...MEMORY_ITEMS, ...MEMORY_ITEMS]).map((it, i) => ({...it, uniqueId: i}));
        setMemCards(items);
        setMemFlipped([]);
        setMemMatched([]);
        setMemLock(false);
        setScreen("memory");
        speak("Encontre os pares dos itens mágicos!");
      };

      const flipCard = (index) => {
        if (memLock || memFlipped.includes(index) || memMatched.includes(memCards[index].id)) return;
        const newFlipped = [...memFlipped, index];
        setMemFlipped(newFlipped);
        
        if (newFlipped.length === 2) {
          setMemLock(true);
          const [firstIdx, secondIdx] = newFlipped;
          if (memCards[firstIdx].id === memCards[secondIdx].id) {
            // Match!
            setMemMatched(m => [...m, memCards[firstIdx].id]);
            setPoints(p => p + 20);
            showToast("✨ Par encontrado! +20");
            setMemFlipped([]);
            setMemLock(false);
            
            if (memMatched.length + 1 === MEMORY_ITEMS.length) {
              speak("Incrível! Você tem uma memória de princesa.");
              setTimeout(()=>setScreen("castle"), 2000);
            }
          } else {
            // No match
            setTimeout(() => {
              setMemFlipped([]);
              setMemLock(false);
            }, 1000);
          }
        }
      };


      // --- LAYOUTS ---

      const BackgroundCasteloReais = () => (
        <div style={{
          position:"fixed", inset:0, zIndex:0,
          backgroundImage:`url(https://i.imgur.com/G5B5S7H.png)`, // Salão de Castelo Luxuoso CGI
          backgroundSize:"cover", backgroundPosition:"center", filter:"blur(2px) brightness(0.7)"
        }}>
          {/* Animais ao redor (Simulando CGI) */}
          <div style={{position:"absolute", bottom:"10%", left:"5%", width:120, height:120, backgroundImage:`url(https://i.imgur.com/X4b5bV5.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", animation:"float 4s infinite", opacity:0.8}} title="Unicórnio Mágico"/>
          <div style={{position:"absolute", top:"20%", right:"10%", width:80, height:80, backgroundImage:`url(https://i.imgur.com/I5S5H0Z.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", animation:"float 3s infinite", opacity:0.7}} title="Fênix Dourada"/>
          <div style={{position:"absolute", bottom:"5%", right:"20%", width:60, height:50, backgroundImage:`url(https://i.imgur.com/R8M4f4y.png)`, backgroundSize:"contain", backgroundRepeat:"no-repeat", opacity:0.9}} title="Gatinho Real"/>
        </div>
      );

      const PanelStyle = {
        background: vars.panelBg, border: `1px solid rgba(255,179,217,0.2)`,
        borderRadius: 24, padding: 20, width: "100%", maxWidth: 420,
        boxShadow: `0 15px 35px rgba(0,0,0,0.5)`, backdropFilter: "blur(10px)",
        position:"relative", zIndex:1
      };

      const TABS = [
        {k:"closet",l:"Closet 👗"},{k:"hair",l:"Salão ✂️"},{k:"sapatos",l:"Sapatos 👠"},
        {k:"games",l:"Jogos ⭐"},{k:"arcade",l:"Arcade 9+ 🕹️"},{k:"gallery",l:"Galeria 📸"}
      ];


      return (
        <div style={{minHeight:"100vh", position:"relative"}}>
          
          {/* Audio Element (Música de Castelo/Princesas) */}
          <audio ref={audioRef} loop preload="auto">
            <source src="https://cdn.pixabay.com/download/audio/2024/03/15/audio_134567ac8d.mp3" type="audio/mpeg"/> 
            {/* Nota: Substituir por uma URL estável de música estilo realeza se esta falhar */}
          </audio>

          {/* Fundo Estrelado Mágico */}
          <div style={{position:"fixed",inset:0,zIndex:1,pointerEvents:"none",backgroundImage:"url(https://www.transparenttextures.com/patterns/stardust.png)",opacity:0.3}}/>

          {/* Botão Música & Pontos HUD */}
          <div style={{position:"fixed", top:15, right:15, zIndex:100, display:"flex", alignItems:"center", gap:15}}>
            <div style={{background:vars.panelBg, padding:"8px 15px", borderRadius:20, color:vars.gold, fontWeight:"700", border:`1px solid ${vars.gold}44`}}>
              ⭐ {points} <span style={{fontSize:10, color:vars.pPink}}>(Nível {level})</span>
            </div>
            <button onClick={toggleMusic} style={{background:"rgba(247,37,133,0.3)", border:`1px solid ${vars.dPink}`, borderRadius:"50%", width:40, height:40, color:"white", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center"}}>
              {musicOn ? "🎵" : "🔇"}
            </button>
          </div>

          {toast && (
            <div style={{position:"fixed", top:70, left:"50%", transform:"translateX(-50%)", background:`linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple})`, color:"white", padding:"12px 25px", borderRadius:30, fontSize:14, fontWeight:"600", zIndex:1000, boxShadow:`0 5px 15px rgba(0,0,0,0.3)`, animation:"fadeInDown 0.3s ease, fadeOutUp 0.3s ease 2.7s"}}>
              {toast}
            </div>
          )}


          {/* --- TELAS --- */}

          {screen === "home" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:20, textAlign:"center", position:"relative", zIndex:2}}>
              <div style={{position:"absolute", inset:0, backgroundImage:`url(https://i.imgur.com/G5B5S7H.png)`, backgroundSize:"cover", filter:"blur(3px) brightness(0.5)", zIndex:-1}}/>
              
              <div className="glow" style={{fontSize:60, marginBottom:10}}>🏰</div>
              <h1 className="glow" style={{fontFamily:vars.fontFancy, fontSize:"clamp(40px, 10vw, 64px)", color:vars.gold, margin:0, textShadow:`0 0 20px ${vars.pPink}`}}>Laura Valentina</h1>
              <h2 style={{textTransform:"uppercase", letterSpacing:6, fontSize:16, color:vars.pPink, margin:"0 0 15px 0", fontWeight:"700"}}>Dream Castle</h2>
              <p style={{fontStyle:"italic", color:"rgba(255,255,255,0.7)", maxWidth:300, marginBottom:40, fontSize:14}}>Vista suas bonecas favoritas, jogue jogos mágicos e explore o castelo real!</p>
              
              <button className="float" onClick={()=>setScreen("select")} style={{padding:"20px 40px", borderRadius:50, background:`linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple}, ${vars.gold})`, color:"white", fontSize:18, fontWeight:"700", letterSpacing:1, boxShadow:`0 10px 30px rgba(247,37,133,0.6)`, textTransform:"uppercase"}}>
                Entrar no Castelo Mágico
              </button>
              <div style={{marginTop:20, fontSize:12, color:"rgba(255,255,255,0.5)"}}>9 PERSONAGENS MODELO 3D - PONTOS: {points}</div>
            </div>
          )}

          {screen === "select" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 20px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              <div style={{fontFamily:vars.fontFancy, color:vars.gold, fontSize:40, marginBottom:5, glow:true}}>Escolha sua Boneca</div>
              <p style={{color:vars.pPink, marginTop:0, marginBottom:30}}>Selecione uma modelo para brilhar</p>
              
              <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(110px, 1fr))", gap:15, width:"100%", maxWidth:400}}>
                {CHARACTERS.map(c=>(
                  <div key={c.id} onClick={()=>selectChar(c)} style={{
                    background:vars.panelBg, border:`1px solid rgba(255,179,217,0.3)`, borderRadius:16, padding:15, cursor:"pointer",
                    textAlign:"center", transition:"all 0.3s ease", position:"relative", overflow:"hidden"
                  }} className="char-card" onMouseEnter={e=>{e.currentTarget.style.borderColor=vars.gold; e.currentTarget.style.transform="translateY(-5px)"}} onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,179,217,0.3)'; e.currentTarget.style.transform="translateY(0)"}}>
                    <div style={{width:"100%", height:120, backgroundImage:`url(${c.img})`, backgroundSize:"contain", backgroundPosition:"center", backgroundRepeat:"no-repeat", marginBottom:10}}/>
                    <div style={{color:vars.gold, fontWeight:"700", fontSize:14}}>{c.name}</div>
                    <div style={{color:"rgba(255,255,255,0.6)", fontSize:10, marginTop:2}}>{c.job}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setScreen("home")} style={{marginTop:30, background:"transparent", color:vars.pPink, border:`1px solid ${vars.dPink}`, padding:"10px 20px", borderRadius:20}}>Voltar</button>
            </div>
          )}

          {screen === "castle" && char && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"70px 15px 30px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              
              {/* Área da Boneca */}
              <div style={{position:"relative", marginBottom:25, animation:"float 4s ease-in-out infinite"}}>
                <RealDoll char={char} hairS={hairS} hairC={hairC} dress={dress} shoes={shoes} acc={acc} crown={crown} onClick={onDollClick} />
                <div style={{position:"absolute", bottom:-15, left:"50%", transform:"translateX(-50%)", background:"rgba(0,0,0,0.5)", width:150, height:20, borderRadius:"50%", filter:"blur(5px)", zIndex:0}}/>
              </div>

              {/* Info & Botões de Ação */}
              <div style={{textAlign:"center", marginBottom:20, zIndex:1}}>
                <div style={{color:vars.gold, fontSize:22, fontWeight:"700", fontFamily:vars.fontFancy}}>{char.name}</div>
                <div style={{color:"rgba(255,255,255,0.7)", fontSize:12, textTransform:"uppercase", letterSpacing:2, marginBottom:15}}>{char.job}</div>
                <div style={{display:"flex", gap:10, justifyContent:"center"}}>
                  <Btn primary onClick={saveLook} icon="📸">Salvar Look</Btn>
                </div>
              </div>

              {/* PAINEL DE CONTROLE (ABAS) */}
              <div style={PanelStyle}>
                {/* Menu de Abas */}
                <div style={{display:"flex", alignItems:"center", gap:5, marginBottom:15}}>
                  <button onClick={()=>scrollTabs(-1)} style={{background:"none", color:vars.gold, fontSize:18}}>❮</button>
                  <div ref={scrollRef} className="hide-scroll" style={{display:"flex", gap:8, overflowX:"auto", scrollBehavior:"smooth", padding:"5px 0"}}>
                    {TABS.map(t => (
                      <button key={t.k} onClick={()=>setTab(t.k)} style={{
                        flexShrink:0, padding:"8px 16px", borderRadius:20, fontSize:12, fontWeight:"600", whiteSpace:"nowrap",
                        background: tab===t.k ? `linear-gradient(135deg, ${vars.dPink}, ${vars.lPurple})` : "rgba(255,255,255,0.05)",
                        color: tab===t.k ? "white" : vars.pPink, border: `1px solid ${tab===t.k?vars.gold:'transparent'}`
                      }}>{t.l}</button>
                    ))}
                  </div>
                  <button onClick={()=>scrollTabs(1)} style={{background:"none", color:vars.gold, fontSize:18}}>❯</button>
                </div>

                {/* Conteúdo das Abas */}
                <div style={{minHeight:200}}>
                  
                  {tab === "closet" && (
                    <div className="page-enter">
                      <SectionTitle t="Vestidos Reais (CGI)" />
                      <div style={{display:"flex", gap:10, overflowX:"auto", paddingBottom:10}} className="hide-scroll">
                        {DRESS_ASSETS.map(img => <Swatch key={img} type="img" img={img} selected={dress===img} onClick={()=>setDress(img)} />)}
                      </div>
                      <SectionTitle t="Acessórios Brilhantes" />
                      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                        <Btn active={crown} onClick={()=>setCrown(!crown)} icon="👑">Coroa Real</Btn>
                        <Btn active={acc} onClick={()=>setAcc(!acc)} icon="📿">Colar Diamante</Btn>
                      </div>
                    </div>
                  )}

                  {tab === "hair" && (
                    <div className="page-enter">
                      <SectionTitle t="Penteados Dinâmicos" />
                      <div style={{display:"flex", gap:10, overflowX:"auto", paddingBottom:10}} className="hide-scroll">
                        {HAIR_STYLES.map(style => <Swatch key={style} type="img" img={HAIR_ASSETS[style]} selected={hairS===style} onClick={()=>setHairS(style)} />)}
                      </div>
                       <div style={{color:"rgba(255,255,255,0.6)", fontSize:11, textAlign:"center", marginTop:4}}>Estilo atual: {hairS}</div>
                      <SectionTitle t="Cor do Cabelo" />
                      <div style={{display:"flex", gap:10, flexWrap:"wrap"}}>
                        {HAIR_COLORS.map(color => <Swatch key={color.c} type="color" c={color.c} selected={hairC===color.c} onClick={()=>setHairC(color.c)} title={color.l} />)}
                      </div>
                    </div>
                  )}

                  {tab === "sapatos" && (
                    <div className="page-enter">
                      <SectionTitle t="Coleção de Sapatos Reais" />
                      <div style={{display:"flex", gap:10, overflowX:"auto", paddingBottom:10}} className="hide-scroll">
                        {SHOE_STYLES.map(style => <Swatch key={style} type="img" img={SHOE_ASSETS[style]} selected={shoes===style} onClick={()=>setShoes(style)} />)}
                      </div>
                      <div style={{color:"rgba(255,255,255,0.6)", fontSize:12, textAlign:"center", marginTop:5, fontWeight:"600"}}>{shoes}</div>
                    </div>
                  )}

                  {tab === "games" && (
                    <div className="page-enter">
                      <SectionTitle t="Mini Jogos Mágicos" />
                      <div style={{display:"flex", flexDirection:"column", gap:12}}>
                        
                        {/* Jogo da Memória (Sempre Liberado) */}
                        <div style={{background:"rgba(255,255,255,0.05)", padding:15, borderRadius:12, border:`1px solid rgba(255,179,217,0.2)`}}>
                          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                            <div style={{color:vars.gold, fontWeight:"600"}}>Memory Match Real 💎</div>
                            <div style={{color:vars.pPink, fontSize:11}}>+20 estrelas/par</div>
                          </div>
                          <p style={{color:"rgba(255,255,255,0.7)", fontSize:12, margin:"0 0 10px 0"}}>Encontre pares de coroas, sapatos e animais marinhos reais.</p>
                          <Btn onClick={startMemory} primary icon="🧩">Jogar Memória</Btn>
                        </div>

                        {/* Jogo de Corrida (Bloqueado < Nivel 2) */}
                        <div style={{background:"rgba(255,255,255,0.05)", padding:15, borderRadius:12, border:`1px solid ${level>=2?'rgba(255,179,217,0.2)':'#555'}`, opacity: level>=2?1:0.6}}>
                          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                            <div style={{color: level>=2?vars.gold:'#aaa', fontWeight:"600"}}>Aventura no Jardim 🏃‍♀️ {level<2 && "🔒"}</div>
                            <div style={{color:level>=2?vars.pPink:'#888', fontSize:11}}>Corrida & Obstáculos</div>
                          </div>
                          {level < 2 ? (
                            <p style={{color:"#ff4d6d", fontSize:12, margin:0, fontWeight:"600"}}>🔒 Desbloqueia no Nível 2 (300 Estrelas). Você tem {points}.</p>
                          ) : (
                            <>
                              <p style={{color:"rgba(255,255,255,0.7)", fontSize:12, margin:"0 0 10px 0"}}>Corra pelo jardim, pule obstáculos e colete pontos.</p>
                              <Btn onClick={()=>setScreen("runner")} primary icon="🏁">Jogar Corrida</Btn>
                            </>
                          )}
                        </div>

                      </div>
                    </div>
                  )}

                   {tab === "arcade" && (
                    <div className="page-enter">
                      <SectionTitle t="HUB de Jogos Arcade 9+ (Mais de 30!)" />
                      <p style={{color:"rgba(255,255,255,0.6)", fontSize:11, marginTop:-5, marginBottom:15}}>Conteúdo profissional para mentes curiosas.</p>
                      <div style={{display:"flex", flexDirection:"column", gap:8, maxHeight:250, overflowY:"auto", paddingRight:5}}>
                        {ARCADE_GAMES.map(g => {
                          const isLocked = g.level && level < g.level;
                          return (
                            <div key={g.id} style={{
                              background: isLocked ? "rgba(255,255,255,0.02)" : "rgba(257,37,133,0.05)", 
                              padding:"10px 15px", borderRadius:10, display:"flex", alignItems:"center", justify:"space-between",
                              border:`1px solid ${isLocked?'#444':'rgba(247,37,133,0.2)'}`, opacity: isLocked?0.6:1
                            }}>
                              <div style={{display:"flex", alignItems:"center", gap:10}}>
                                <span style={{fontSize:20}}>{g.icon}</span>
                                <div>
                                  <div style={{color:isLocked?'#aaa':vars.text, fontSize:13, fontWeight:"600"}}>{g.title} {isLocked && "🔒"}</div>
                                  <div style={{color:vars.pPink, fontSize:10, textTransform:"uppercase"}}>{g.cat}</div>
                                </div>
                              </div>
                              <button style={{marginLeft:"auto", background:isLocked?'#555':vars.dPink, color:"white", fontSize:11, padding:"5px 10px", borderRadius:6, cursor:isLocked?'not-allowed':'pointer'}}>
                                {isLocked ? `Nv ${g.level}` : 'JOGAR'}
                              </button>
                            </div>
                          )
                        })}
                      </div>
                       <div style={{color:"rgba(255,255,255,0.4)", fontSize:10, textAlign:"center", marginTop:10}}>Nota: Botões 'JOGAR' simulam o carregamento no HUB profissional.</div>
                    </div>
                  )}

                  {tab === "gallery" && (
                    <div className="page-enter">
                      <SectionTitle t={`Meus Looks Salvos (${gallery.length}/10)`} />
                      {gallery.length === 0 ? (
                        <div style={{textAlign:"center", color:"rgba(255,255,255,0.5)", padding:"30px 0", fontStyle:"italic", fontSize:13}}>Nenhum look salvo ainda. Crie um visual incrível e clique em "Salvar Look"!</div>
                      ) : (
                        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                          {gallery.map(lk => (
                            <div key={lk.id} style={{background:"rgba(255,255,255,0.03)", border:`1px solid rgba(255,179,217,0.2)`, borderRadius:12, padding:10, textAlign:"center"}}>
                              <div style={{display:"flex", justifyContent:"center", transform:"scale(0.4)", height:160, marginBottom:-70, marginTop:-80}}>
                                <RealDoll char={lk.char} hairS={lk.hairS} hairC={lk.hairC} dress={lk.dress} shoes={lk.shoes} acc={lk.acc} crown={lk.crown} size="small" />
                              </div>
                              <div style={{color:vars.gold, fontSize:12, fontWeight:"600"}}>{lk.char.name}</div>
                              <button onClick={()=>{
                                setChar(lk.char); setDress(lk.dress); setHairS(lk.hairS); setHairC(lk.hairC);
                                setShoes(lk.shoes); setAcc(lk.acc); setCrown(lk.crown); setTab("closet");
                                speak("Look restaurado! Ficou lindo.");
                                showToast("✨ Look carregado!");
                              }} style={{background:vars.dPink, color:"white", fontSize:10, padding:"4px 8px", borderRadius:4, marginTop:5}}>Carregar</button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}

                </div>
              </div> {/* Fim Painel */}

              <button onClick={()=>setScreen("select")} style={{marginTop:30, background:"transparent", color:vars.pPink, border:`1px solid ${vars.dPink}`, padding:"10px 20px", borderRadius:20}}>Trocar Boneca</button>
            </div>
          )}


          {/* --- TELA JOGO DA MEMÓRIA --- */}
          {screen === "memory" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 15px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              <div style={{fontFamily:vars.fontFancy, color:vars.gold, fontSize:36, marginBottom:5}}>Memory Match Real</div>
              <p style={{color:vars.pPink, margin:"0 0 20px 0"}}>Pares: {memMatched.length} / {MEMORY_ITEMS.length} ⭐ Pontos: {points}</p>
              
              <div style={{display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:10, width:"100%", maxWidth:380}}>
                {memCards.map((card, index) => {
                  const isFlipped = memFlipped.includes(index);
                  const isMatched = memMatched.includes(card.id);
                  return (
                    <div key={card.uniqueId} onClick={()=>flipCard(index)} style={{
                      height:90, borderRadius:12, cursor:"pointer", position:"relative",
                      transformStyle:"preserve-3d", transition:"transform 0.5s",
                      transform: isFlipped || isMatched ? "rotateY(180deg)" : "rotateY(0deg)",
                    }}>
                      {/* Frente (Escondida) */}
                      <div style={{
                        position:"absolute", inset:0, background:`linear-gradient(135deg, ${vars.lPurple}, #2a003a)`,
                        borderRadius:12, border:`2px solid ${vars.dPink}`, display:"flex", alignItems:"center", justifyContent:"center",
                        fontSize:30, color:vars.gold, backfaceVisibility:"hidden", zIndex:2
                      }}>💎</div>
                      
                      {/* Verso (Imagem Real) */}
                      <div style={{
                        position:"absolute", inset:0, background:"#fff", borderRadius:12, 
                        border:`3px solid ${isMatched? vars.gold : vars.text}`,
                        backgroundImage:`url(${card.img})`, backgroundSize:"contain", backgroundPosition:"center", backgroundRepeat:"no-repeat",
                        transform:"rotateY(180deg)", backfaceVisibility:"hidden", zIndex:1,
                        boxShadow: isMatched ? `0 0 15px ${vars.gold}` : "none"
                      }}/>
                    </div>
                  );
                })}
              </div>

              {memMatched.length === MEMORY_ITEMS.length && (
                <div style={{marginTop:25, textAlign:"center", animation:"pulseBtn 2s infinite"}}>
                  <div style={{color:vars.gold, fontSize:20, fontWeight:"700"}}>🎉 PARABÉNS! 🎉</div>
                  <div style={{color:"white"}}>Você completou o desafio!</div>
                </div>
              )}

              <div style={{display:"flex", gap:10, marginTop:30}}>
                <Btn onClick={startMemory}>Reiniciar</Btn>
                <Btn primary onClick={()=>setScreen("castle")}>Voltar ao Castelo</Btn>
              </div>
            </div>
          )}

          {/* --- TELA JOGO DE CORRIDA --- */}
          {screen === "runner" && (
            <div className="page-enter" style={{display:"flex", flexDirection:"column", alignItems:"center", padding:"60px 15px", position:"relative", zIndex:2}}>
              <BackgroundCasteloReais />
              <RunnerGame onClose={()=>setScreen("castle")} addPoints={(p)=>setPoints(prev=>prev+p)} />
            </div>
          )}


        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

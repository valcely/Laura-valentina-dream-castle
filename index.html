<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laura Valentina ✨ Dream Castle</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars-bg"></div>

<div class="screen active" id="home">
  <div class="home-doll-container" id="home-doll">
    </div>
  <div class="home-logo">Laura Valentina</div>
  <div class="home-sub">✨ DREAM CASTLE ✨</div>
  <button class="enter-btn" onclick="go('select')">ENTRAR NO CASTELO</button>
</div>

<div class="screen" id="select">
  <button class="back-btn" onclick="go('home')">← Voltar</button>
  <h2 class="section-title">Escolha sua Boneca 🎀</h2>
  <div class="chars-grid" id="chars-grid"></div>
</div>

<div class="screen" id="castle">
  <button class="back-btn" onclick="go('select')">← Trocar</button>
  <div class="castle-header" id="castle-header"></div>
  <div class="menu-grid">
    <div class="menu-tile" onclick="go('vestir')">
      <div class="tile-icon">👗</div>
      <div class="tile-label">Vestir</div>
      <p class="tile-sub">Monte o look</p>
    </div>
    <div class="menu-tile" onclick="go('passarela')">
      <div class="tile-icon">💃</div>
      <div class="tile-label">Passarela</div>
      <p class="tile-sub">Mostre estilo</p>
    </div>
    <div class="menu-tile" onclick="go('aventura');startStory()">
      <div class="tile-icon">🌟</div>
      <div class="tile-label">Aventura</div>
      <p class="tile-sub">Escolha o caminho</p>
    </div>
    <div class="menu-tile" onclick="go('salao')">
      <div class="tile-icon">💄</div>
      <div class="tile-label">Salão</div>
      <p class="tile-sub">Beleza total</p>
    </div>
    <div class="menu-tile" onclick="go('quiz');startQuiz()">
      <div class="tile-icon">🧠</div>
      <div class="tile-label">Quiz</div>
      <p class="tile-sub">Teste seu estilo</p>
    </div>
  </div>
</div>

<div class="screen" id="vestir">
  <button class="back-btn" onclick="go('castle')">← Voltar</button>
  <h2 class="section-title">👗 Closet Real</h2>
  <div class="doll-stage" id="vestir-doll"></div>
  <div class="outfits-panel">
    <p class="section-label">Escolha o Look</p>
    <div class="outfit-row" id="outfit-row"></div>
  </div>
</div>

<div class="screen" id="passarela">
  <button class="back-btn" onclick="go('castle')">← Voltar</button>
  <h2 class="section-title">💃 Grande Desfile</h2>
  <div class="runway-stage">
    <div id="runway-lights" class="runway-lights"></div>
    <div class="runway-model" id="runway-model">
      <div id="runway-doll"></div>
    </div>
  </div>
  <div class="score-bar">⭐ Pontuação: <span id="runway-score">0</span></div>
  <div class="action-row">
    <button class="action-btn" onclick="runwayDo('walk')">Caminhar</button>
    <button class="action-btn" onclick="runwayDo('pose')">Posar</button>
    <button class="action-btn" onclick="runwayDo('kiss')">Beijo</button>
  </div>
</div>

<div class="screen" id="salao">
  <button class="back-btn" onclick="go('castle')">← Voltar</button>
  <h2 class="section-title">💄 Camarim Mágico</h2>
  <div id="salao-doll"></div>
  <div class="beauty-grid" id="beauty-grid"></div>
</div>

<div class="screen" id="aventura">
  <button class="back-btn" onclick="go('castle')">← Voltar</button>
  <div class="story-card">
    <div id="story-scene" style="font-size: 4rem;">🏰</div>
    <p id="story-text"></p>
    <div id="story-choices"></div>
  </div>
</div>

<div class="screen" id="quiz">
  <button class="back-btn" onclick="go('castle')">← Voltar</button>
  <div class="quiz-card">
    <div id="quiz-score">0 pts</div>
    <div id="quiz-q"></div>
    <div id="quiz-opts"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laura Valentina - Dream Castle</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- HUD GLOBAL -->
    <div class="global-hud">
        <div class="hud-block hud-left">
            <div id="lbl-date" class="hud-label">DATA</div>
            <div id="hud-date" class="hud-value">01/01/2026</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-block hud-center">
            <div id="lbl-time" class="hud-label">HORA</div>
            <div id="hud-time" class="hud-value">00:00</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-block hud-right">
            <div id="lbl-char" class="hud-label">PRINCESA</div>
            <div id="hud-char" class="hud-value">Laura</div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-block">
            <div id="lbl-session" class="hud-label">SESSAO</div>
            <div id="hud-session" class="hud-value">0s</div>
        </div>
    </div>

    <!-- CANVAS DE FUNDO (estrelas) -->
    <canvas id="bg-particles"></canvas>

    <!-- TELAS DO JOGO (todas as telas que você tinha) -->
    <div id="screen-home" class="screen active"> ... (todo o conteúdo que você já tinha) </div>
    <!-- As outras telas (char-select, customize, race, memory, snake, quiz, etc.) continuam exatamente como você tinha, só com as IDs corretas. -->

    <!-- Language switcher -->
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast-msg"></div>
</body>
</html>

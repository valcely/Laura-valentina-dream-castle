<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura Valentina - Dream Castle</title>

<style>
body{
margin:0;
font-family:Georgia,serif;
background:#100010;
color:white;
text-align:center;
}

.screen{display:none;padding:20px;}
.active{display:block;}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#f72585,#c77dff);
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
opacity:0.8;
}

.card{
background:#1a0018;
padding:12px;
margin:10px;
border-radius:12px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
}

.doll{
width:120px;
height:180px;
margin:10px auto;
border-radius:20px;
background:#f5c5a3;
position:relative;
}

.hair{
position:absolute;
top:0;
width:100%;
height:50px;
background:#8B4513;
border-radius:20px 20px 0 0;
}

.dress{
position:absolute;
bottom:0;
width:100%;
height:80px;
background:#f72585;
border-radius:0 0 20px 20px;
}

#grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
max-width:260px;
margin:auto;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<h1>👑 Laura Valentina</h1>
<p>Dream Castle</p>
<button onclick="go('select')">Entrar</button>
</div>

<!-- PERSONAGENS -->
<div id="select" class="screen">
<h2>Escolha sua personagem</h2>

<div class="card" onclick="start('Giovanna')">Giovanna - Princesa</div>
<div class="card" onclick="start('Lidiane')">Lidiane - Astronauta</div>
<div class="card" onclick="start('Valcely')">Valcely - Engenheira</div>

<button onclick="go('home')">Voltar</button>
</div>

<!-- JOGO -->
<div id="game" class="screen">
<h2 id="name"></h2>
<p>Pontos: <span id="pts">0</span></p>

<div class="doll">
<div id="hair" class="hair"></div>
<div id="dress" class="dress"></div>
</div>

<h3>Vestidos</h3>
<button onclick="setDress('#f72585')">Rosa</button>
<button onclick="setDress('#3a86ff')">Azul</button>
<button onclick="setDress('#ffd700')">Dourado</button>

<h3>Cabelo</h3>
<button onclick="setHair('#8B4513')">Castanho</button>
<button onclick="setHair('#1a1a1a')">Preto</button>
<button onclick="setHair('#f5c542')">Loiro</button>

<h3>Maquiagem</h3>
<button onclick="addPoints(5)">Batom 💄</button>

<br><br>

<button onclick="go('mission')">Missão</button>
<button onclick="go('memory')">Jogo Memória</button>

<br><br>
<button onclick="go('home')">Sair</button>
</div>

<!-- MISSÃO -->
<div id="mission" class="screen">
<h2>Missão</h2>
<p>Qual é o melhor material para construção?</p>

<button onclick="answer(0)">Madeira</button>
<button onclick="answer(1)">Aço</button>
<button onclick="answer(2)">Areia</button>

<p id="res"></p>

<button onclick="go('game')">Voltar</button>
</div>

<!-- MEMÓRIA -->
<div id="memory" class="screen">
<h2>Jogo da Memória</h2>
<div id="grid"></div>

<button onclick="startMemory()">Reiniciar</button>
<button onclick="go('game')">Voltar</button>
</div>

<script>

let pts=0;
let first=null;

function go(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function start(name){
document.getElementById('name').innerText=name;
go('game');
}

function addPoints(v=10){
pts+=v;
document.getElementById('pts').innerText=pts;
}

function setDress(c){
document.getElementById('dress').style.background=c;
addPoints();
}

function setHair(c){
document.getElementById('hair').style.background=c;
addPoints();
}

function answer(i){
if(i===1){
document.getElementById('res').innerText="✔️ Correto!";
addPoints(20);
}else{
document.getElementById('res').innerText="❌ Errado!";
}
}

function startMemory(){
let colors=["red","blue","green","red","blue","green"];
colors.sort(()=>Math.random()-0.5);

let grid=document.getElementById('grid');
grid.innerHTML="";
first=null;

colors.forEach(c=>{
let d=document.createElement('div');
d.style.width="60px";
d.style.height="60px";
d.style.margin="5px";
d.style.background="#333";
d.style.borderRadius="10px";
d.style.cursor="pointer";

d.onclick=()=>{
if(d.dataset.open) return;

d.style.background=c;
d.dataset.open=true;

if(!first){
first=d;
}else{
if(first.style.background===d.style.background){
addPoints(15);
}else{
setTimeout(()=>{
first.style.background="#333";
d.style.background="#333";
first.dataset.open=false;
d.dataset.open=false;
},500);
}
first=null;
}
};

grid.appendChild(d);
});
}

startMemory();

</script>

</body>
</html>

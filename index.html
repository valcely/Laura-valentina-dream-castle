<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laura Valentina Dream Castle</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background-color: #100010;
      font-family: 'Nunito', sans-serif; /* Fonte arredondada e suave */
    }
    
    /* Animações Mágicas */
    @keyframes fl { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes df { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes fi { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes gl { 0%,100%{text-shadow:0 0 20px #ffd70088} 50%{text-shadow:0 0 40px #ffd700cc,0 0 60px #f7258566} }
    @keyframes ni { 0%{opacity:0;transform:translateX(-50%) translateY(8px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 85%{opacity:1} 100%{opacity:0} }
    button:active { transform:scale(0.95)!important; }
    
    /* Esconde a barra de rolagem padrão no container de abas */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const CHARACTERS = [
      { id:"giovanna",  name:"Giovanna",  job:"Princesa",           skin:"#f5c5a3", hair:"#8B4513", black:false },
      { id:"lidiane",   name:"Lidiane",   job:"Astronauta",         skin:"#8B5E3C", hair:"#1a0a00", black:true  },
      { id:"valcely",   name:"Valcely",   job:"Engenheira",         skin:"#C68642", hair:"#2a1400", black:true  },
      { id:"laura",     name:"Laura",     job:"Chef",               skin:"#f5c5a3", hair:"#f5c542", black:false },
      { id:"valentina", name:"Valentina", job:"Bombeira",           skin:"#f0b98d", hair:"#b22222", black:false },
      { id:"vitoria",   name:"Vitória",   job:"Presidente",         skin:"#f5c5a3", hair:"#1a1a1a", black:false },
      { id:"ana",       name:"Ana",       job:"Cientista de Dados", skin:"#f5deb3", hair:"#4a2e00", black:false },
      { id:"ayla",      name:"Ayla",      job:"Veterinária",        skin:"#d4956a", hair:"#c77dff", black:false },
      { id:"isa",       name:"Isa",       job:"Médica",             skin:"#8B5E3C", hair:"#1a0a00", black:true  },
      { id:"aurora",    name:"Aurora",    job:"Artista",            skin:"#f5c5a3", hair:"#e0e0e0", black:false },
      { id:"maria",     name:"Maria",     job:"Cantora",            skin:"#C68642", hair:"#f5c542", black:true  },
      { id:"eve",       name:"Eve",       job:"Empresária",         skin:"#f0b98d", hair:"#8B4513", black:false },
    ];

    const DRESS_COLORS = [
      {c:"#f72585",l:"Rosa Neon"},{c:"#ff85c2",l:"Rosa"},{c:"#c77dff",l:"Lilás"},
      {c:"#3a86ff",l:"Azul"},{c:"#ffd700",l:"Dourado"},{c:"#ff006e",l:"Vermelho"},
      {c:"#2ec4b6",l:"Turquesa"},{c:"#ffffff",l:"Branco"},{c:"#ff4d6d",l:"Coral"},
      {c:"#a8d8a8",l:"Verde"},{c:"#1a1a2e",l:"Azul Noite"},{c:"#111111",l:"Preto"},
    ];

    const HAIR_COLORS = [
      {c:"#f5c542",l:"Loiro"},{c:"#8B4513",l:"Castanho"},{c:"#1a1a1a",l:"Preto"},
      {c:"#b22222",l:"Ruivo"},{c:"#f72585",l:"Rosa"},{c:"#c77dff",l:"Roxo"},
      {c:"#4fc3f7",l:"Azul"},{c:"#e0e0e0",l:"Platinado"},{c:"#2a1400",l:"Escuro"},
    ];

    const LIP_COLORS = [
      {c:"#f72585",l:"Rosa"},{c:"#cc0000",l:"Vermelho"},{c:"#c77dff",l:"Roxo"},
      {c:"#ff8fab",l:"Nude"},{c:"#8d0000",l:"Vinho"},{c:"#ff6b35",l:"Coral"},
    ];

    const SHADOW_COLORS = [
      {c:"none",l:"Sem"},{c:"#c77dff",l:"Roxo"},{c:"#3a86ff",l:"Azul"},
      {c:"#ffd700",l:"Dourado"},{c:"#f72585",l:"Rosa"},{c:"#1a1a1a",l:"Preto"},
    ];

    const HAIR_STYLES = ["Liso","Ondulado","Cacheado","Crespo","Curto","Rabo"];
    const SHOE_STYLES = ["Nenhum", "Scarpin", "Tênis", "Bota", "Sandália"];

    const SCENES = [
      {k:"castle",l:"Castelo",bg:"linear-gradient(180deg,#2a003a,#0d0020)"},
      {k:"night",l:"Noite",bg:"linear-gradient(180deg,#050520,#0a0a3f)"},
      {k:"garden",l:"Jardim",bg:"linear-gradient(180deg,#0a2010,#1a4020)"},
      {k:"beach",l:"Praia",bg:"linear-gradient(180deg,#005580,#0088bb)"},
      {k:"city",l:"Cidade",bg:"linear-gradient(180deg,#0a0a1a,#1a1a3e)"},
      {k:"fashion",l:"Passarela",bg:"linear-gradient(180deg,#1a001a,#330022)"},
    ];

    const MISSIONS = [
      {id:"m1",icon:"rocket",title:"Órbita Perfeita",char:"Lidiane",q:"Qual direção garante órbita estável?",opts:["Para o sol","Paralela à Terra","Perpendicular","Tangente à órbita"],ans:3,edu:"Uma órbita tangente garante velocidade e trajetória estáveis ao redor do planeta."},
      {id:"m2",icon:"gear",title:"Construção Sustentável",char:"Valcely",q:"Qual material é mais resistente para pontes?",opts:["Madeira comum","Plástico","Aço reforçado","Areia"],ans:2,edu:"O aço reforçado combina resistência estrutural com durabilidade."},
      {id:"m3",icon:"steth",title:"Diagnóstico Preciso",char:"Isa",q:"Qual o primeiro passo no atendimento?",opts:["Receitar remédio","Solicitar exames","Mandar para casa","Ignorar"],ans:1,edu:"Solicitar exames antes garante um diagnóstico preciso."},
      {id:"m4",icon:"chart",title:"Dados Valiosos",char:"Ana",q:"O que é mais importante nos dados?",opts:["Velocidade","Quantidade","Qualidade e contexto","Cores"],ans:2,edu:"Dados de qualidade com contexto são vitais para decisões corretas."},
      {id:"m5",icon:"paw",title:"Cuidado Animal",char:"Ayla",q:"Como ajudar um animal desnutrido?",opts:["Dar muito alimento","Hidratação gradual","Dar só água","Medicar sem exame"],ans:1,edu:"Eles precisam de reidratação e reintrodução gradual de alimentos."},
    ];

    const MEM_VALS = ["Rosa","Azul","Ouro","Verde","Lilás","Coral","Rubi","Prata"];
    const MEM_COLORS = {Rosa:"#f72585",Azul:"#3a86ff",Ouro:"#ffd700",Verde:"#2ec4b6",Lilás:"#c77dff",Coral:"#ff4d6d",Rubi:"#cc0000",Prata:"#aaaaaa"};
    const shuffle = a => [...a].sort(()=>Math.random()-0.5);

    function lighten(hex) {
      try {
        let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
        return "rgb("+Math.min(255,r+55)+","+Math.min(255,g+40)+","+Math.min(255,b+60)+")";
      } catch(e) { return hex; }
    }

    // O Componente da Boneca (Melhorado para parecer mais viva)
    function Doll({skin, hairC, dress, lip, shadow, blush, acc, crown, shoes}) {
      const bo = blush==="strong"?0.75:blush==="soft"?0.4:0;
      const ru = lighten(dress);
      
      return (
        <svg viewBox="0 0 140 260" style={{width:"100%",height:"100%",filter:"drop-shadow(0 8px 22px rgba(247,37,133,0.5))"}}>
          {/* Cabelo Fundo */}
          <ellipse cx="70" cy="58" rx="38" ry="55" fill={hairC}/>
          
          {/* Corpo: Vestido */}
          <path d="M42,118 Q28,185 26,248 L114,248 Q112,185 98,118Z" fill={dress}/>
          <path d="M55,122 Q48,168 46,220 L64,220 Q58,168 61,122Z" fill="white" opacity="0.1"/>
          <path d="M26,208 Q70,228 114,208 Q92,240 70,234 Q48,240 26,208Z" fill={ru} opacity="0.9"/>
          
          {/* Braços */}
          <path d="M42,118 Q18,145 20,172 Q30,168 37,150 Q43,133 46,124Z" fill={skin}/>
          <path d="M98,118 Q122,145 120,172 Q110,168 103,150 Q97,133 94,124Z" fill={skin}/>
          <ellipse cx="20" cy="175" rx="9" ry="7" fill={skin}/>
          <ellipse cx="120" cy="175" rx="9" ry="7" fill={skin}/>
          
          {/* Pescoço e Rosto */}
          <rect x="63" y="90" width="14" height="25" rx="6" fill={skin}/>
          <ellipse cx="70" cy="65" rx="27" ry="32" fill={skin}/>
          
          {/* ROSTO MELHORADO (Barbie) */}
          {/* Sombra */}
          {shadow!=="none" && <>
            <ellipse cx="58" cy="60" rx="9" ry="5" fill={shadow} opacity="0.6"/>
            <ellipse cx="82" cy="60" rx="9" ry="5" fill={shadow} opacity="0.6"/>
          </>}
          
          {/* Olhos Parte Branca */}
          <path d="M51,61 Q58,56 65,61 Q58,64 51,61Z" fill="white"/>
          <path d="M75,61 Q82,56 89,61 Q82,64 75,61Z" fill="white"/>
          
          {/* Íris e Pupila */}
          <circle cx="58" cy="60.5" r="3" fill="#3a86ff"/>
          <circle cx="82" cy="60.5" r="3" fill="#3a86ff"/>
          <circle cx="58" cy="60.5" r="1.5" fill="#111"/>
          <circle cx="82" cy="60.5" r="1.5" fill="#111"/>
          <circle cx="57" cy="59.5" r="0.8" fill="white"/>
          <circle cx="81" cy="59.5" r="0.8" fill="white"/>
          
          {/* Cílios e Delineado */}
          <path d="M51,61 Q58,55 65,61" stroke="black" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
          <path d="M75,61 Q82,55 89,61" stroke="black" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
          <path d="M50,60 L47,58 M52,58 L50,55" stroke="black" strokeWidth="1" fill="none"/>
          <path d="M90,60 L93,58 M88,58 L90,55" stroke="black" strokeWidth="1" fill="none"/>

          {/* Sobrancelhas */}
          <path d="M49,53 Q57,49 65,53" stroke="#3a1a00" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
          <path d="M75,53 Q83,49 91,53" stroke="#3a1a00" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
          
          {/* Nariz */}
          <path d="M68,71 Q70,74 72,71" stroke="#c8906a" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
          
          {/* Blush */}
          <ellipse cx="50" cy="74" rx="10" ry="6" fill="#ffb3d9" opacity={bo}/>
          <ellipse cx="90" cy="74" rx="10" ry="6" fill="#ffb3d9" opacity={bo}/>

          {/* Boca mais desenhada */}
          <path d="M62,83 Q70,78 78,83 Q70,88 62,83Z" fill={lip}/>
          <path d="M62,83 Q70,81 78,83" stroke="rgba(0,0,0,0.2)" strokeWidth="0.5" fill="none"/>
          <ellipse cx="70" cy="85" rx="5" ry="1.5" fill="white" opacity="0.4"/>

          {/* Cabelo Frente */}
          <path d="M41,52 Q43,24 70,22 Q97,24 99,52 Q97,40 70,40 Q43,40 41,52Z" fill={hairC}/>

          {/* Acessórios: Colar arrumado no pescoço */}
          {acc && <>
            <path d="M60,105 Q70,115 80,105" stroke="#ffd700" strokeWidth="2" fill="none"/>
            <circle cx="70" cy="110" r="4" fill="#f72585"/>
            <circle cx="70" cy="110" r="2" fill="#ffd700"/>
            <ellipse cx="50" cy="78" rx="3" ry="5" fill="#ffd700"/>
            <ellipse cx="90" cy="78" rx="3" ry="5" fill="#ffd700"/>
          </>}

          {/* Pés / Pernas Base */}
          <ellipse cx="45" cy="246" rx="12" ry="6" fill={skin}/>
          <ellipse cx="95" cy="246" rx="12" ry="6" fill={skin}/>

          {/* Sapatos Selecionáveis */}
          {shoes === "Scarpin" && <>
            <path d="M33,246 Q45,235 57,246 L53,252 L33,250 Z" fill={lip}/>
            <path d="M83,246 Q95,235 107,246 L103,252 L83,250 Z" fill={lip}/>
          </>}
          {shoes === "Tênis" && <>
            <path d="M30,242 L60,242 L60,252 L30,252 Z" rx="4" fill="white"/>
            <path d="M80,242 L110,242 L110,252 L80,252 Z" rx="4" fill="white"/>
          </>}
          {shoes === "Bota" && <>
            <path d="M35,220 L55,220 L58,252 L32,252 Z" fill="#111"/>
            <path d="M85,220 L105,220 L108,252 L82,252 Z" fill="#111"/>
          </>}
          {shoes === "Sandália" && <>
            <rect x="35" y="244" width="20" height="3" fill="#ffd700"/>
            <rect x="85" y="244" width="20" height="3" fill="#ffd700"/>
            <rect x="35" y="250" width="20" height="4" fill="#111"/>
            <rect x="85" y="250" width="20" height="4" fill="#111"/>
          </>}

          {/* Coroa Arrumada (Topo da cabeça, maior) */}
          {crown && (
             <polygon points="70,0 55,-15 62,5 70,-18 78,5 85,-15 70,0" transform="translate(0, 20) scale(1.3)" fill="#ffd700" stroke="#f72585" strokeWidth="1"/>
          )}
        </svg>
      );
    }

    function Swatch({c, selected, onClick}) {
      const bg = c==="none"
        ? "repeating-linear-gradient(45deg,#555,#555 4px,#333 4px,#333 8px)"
        : c;
      return (
        <div onClick={onClick} style={{
          width:36, height:36, borderRadius:"50%", background:bg, cursor:"pointer",
          border:"3px solid "+(selected?"#ffd700":"transparent"),
          transform:selected?"scale(1.22)":"scale(1)",
          transition:"all .18s",
          boxShadow:selected?"0 0 10px #ffd70088":"none",
          flexShrink:0,
        }}/>
      );
    }

    function Btn({active, onClick, children}) {
      return (
        <button onClick={onClick} style={{
          background:active?"linear-gradient(135deg,#f72585,#c77dff)":"rgba(255,255,255,0.04)",
          border:"1px solid "+(active?"transparent":"rgba(247,37,133,0.25)"),
          borderRadius:12, padding:"9px 7px", color:active?"white":"#ffb3d9",
          cursor:"pointer", fontSize:12, fontFamily:"'Nunito', sans-serif", fontWeight:"bold",
          transition:"all .18s", letterSpacing:1,
        }}>{children}</button>
      );
    }

    function App() {
      const [screen, setScreen] = useState("home");
      const [char, setChar] = useState(null);
      const [tab, setTab] = useState("closet");
      
      const [dress, setDress] = useState("#f72585");
      const [hairC, setHairC] = useState("#8B4513");
      const [hairS, setHairS] = useState("Liso");
      const [lip, setLip] = useState("#f72585");
      const [shadow, setShadow] = useState("none");
      const [blush, setBlush] = useState("soft");
      const [acc, setAcc] = useState(false);
      const [crown, setCrown] = useState(false);
      const [shoes, setShoes] = useState("Scarpin");
      
      const [scene, setScene] = useState("castle");
      const [gallery, setGallery] = useState([]);
      const [points, setPoints] = useState(0);
      const [toast, setToast] = useState("");
      
      const [mission, setMission] = useState(null);
      const [mAns, setMAns] = useState(null);
      const [memCards, setMemCards] = useState([]);
      const [memFlipped, setMemFlipped] = useState([]);
      const [memMatched, setMemMatched] = useState([]);
      const [memLock, setMemLock] = useState(false);
      const [musicOn, setMusicOn] = useState(false);

      const audioRef = useRef(null);
      const scrollRef = useRef(null);

      function toggleMusic() {
        if(musicOn) { audioRef.current.pause(); setMusicOn(false); }
        else { audioRef.current.play(); setMusicOn(true); }
      }

      function showToast(msg) { setToast(msg); setTimeout(()=>setToast(""), 2500); }

      function scrollTabs(dir) {
        if(scrollRef.current) {
          scrollRef.current.scrollBy({ left: dir * 120, behavior: 'smooth' });
        }
      }

      function pickChar(c) {
        setChar(c); setHairC(c.hair); setDress("#f72585");
        setHairS(c.black?"Crespo":"Liso"); setLip("#f72585");
        setShadow("none"); setBlush("soft"); setAcc(false); setCrown(false); setShoes("Scarpin");
        setTab("closet"); setScreen("castle");
      }

      function saveLook() {
        setGallery(g=>[{id:Date.now(),char,dress,hairC,hairS,lip,shadow,blush,acc,crown,shoes,scene},...g].slice(0,12));
        setPoints(p=>p+10); showToast("Look salvo! +10 pontos");
      }
      
      function deleteLook(id, e) {
        e.stopPropagation();
        setGallery(g => g.filter(lk => lk.id !== id));
        showToast("Look apagado!");
      }

      function startMission(m) { setMission(m); setMAns(null); setScreen("mission"); }

      function answerMission(i) {
        setMAns(i);
        if(i===mission.ans) { setPoints(p=>p+30); showToast("Correto! +30 pontos"); }
        else showToast("Tente novamente na próxima!");
      }

      function startMemory() {
        const pairs = shuffle([...MEM_VALS,...MEM_VALS]).map((v,i)=>({id:i,val:v}));
        setMemCards(pairs); setMemFlipped([]); setMemMatched([]); setMemLock(false); setScreen("memory");
      }

      function flipCard(id) {
        if(memLock||memFlipped.includes(id)||memMatched.includes(memCards[id].val)) return;
        const next = [...memFlipped, id];
        setMemFlipped(next);
        if(next.length===2) {
          setMemLock(true);
          const [a,b] = next.map(i=>memCards[i].val);
          setTimeout(()=>{
            if(a===b) { setMemMatched(m=>[...m,a]); setPoints(p=>p+15); showToast("+15 pontos!"); }
            setMemFlipped([]); setMemLock(false);
          }, 700);
        }
      }

      const sceneBg = (SCENES.find(s=>s.k===scene)||SCENES[0]).bg;

      const panel = {
        background:"linear-gradient(145deg,#1e001a,#140018)",
        border:"1px solid rgba(247,37,133,0.18)",
        borderRadius:20, padding:16, width:"100%", maxWidth:400,
      };

      function SL({t}) {
        return <div style={{color:"#ffd700",fontSize:10,letterSpacing:3,fontWeight:"bold",textTransform:"uppercase",marginBottom:8,marginTop:12}}>{t}</div>;
      }

      const TABS = [
        {k:"closet",l:"Closet"},{k:"sapatos",l:"Sapatos"},{k:"salao",l:"Salão"},{k:"makeup",l:"Maquiagem"},
        {k:"studio",l:"Estúdio"},{k:"galeria",l:"Galeria"},{k:"missoes",l:"Missões"},{k:"jogos",l:"Jogos"},
      ];

      return (
        <div style={{minHeight:"100vh",background:"#100010",position:"relative",overflowX:"hidden"}}>
          
          <audio ref={audioRef} loop>
            <source src="https://cdn.pixabay.com/download/audio/2022/01/21/audio_31743c58be.mp3" type="audio/mpeg"/>
          </audio>

          {/* Fundo Estrelado */}
          {Array.from({length:55},(_,i)=>{
            const sz=0.8+Math.random()*2.2;
            return <div key={i} style={{position:"fixed",borderRadius:"50%",background:"white",width:sz,height:sz,top:(Math.random()*100)+"%",left:(Math.random()*100)+"%",opacity:0.1+Math.random()*0.7,animation:"fl "+(3+Math.random()*4)+"s ease-in-out infinite",animationDelay:(Math.random()*5)+"s",pointerEvents:"none",zIndex:0}}/>;
          })}

          {/* Música Botão */}
          <button onClick={toggleMusic} style={{position:"fixed", top:15, right:15, zIndex:999, background:"rgba(247,37,133,0.3)", border:"1px solid #f72585", borderRadius:"50%", width:40, height:40, color:"white", cursor:"pointer", fontSize:18}}>
            {musicOn ? "🎵" : "🔇"}
          </button>

          {toast && (
            <div style={{position:"fixed",bottom:30,left:"50%",background:"linear-gradient(135deg,#f72585,#c77dff)",color:"white",padding:"11px 22px",borderRadius:30,fontSize:14,fontWeight:"bold",letterSpacing:1,zIndex:999,animation:"ni 2.5s forwards",whiteSpace:"nowrap"}}>
              {toast}
            </div>
          )}

          {screen==="home" && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:"40px 24px",textAlign:"center",position:"relative",zIndex:1}}>
              <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 50% 100%,rgba(109,0,72,0.55),transparent 65%)",pointerEvents:"none"}}/>
              <svg style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,opacity:0.22,pointerEvents:"none"}} viewBox="0 0 420 220">
                <rect x="60" y="90" width="300" height="130" fill="#f72585"/>
                <rect x="70" y="55" width="65" height="80" fill="#c77dff"/>
                <rect x="285" y="55" width="65" height="80" fill="#c77dff"/>
                <polygon points="102,55 70,55 86,22" fill="#ffd700"/>
                <polygon points="350,55 318,55 334,22" fill="#ffd700"/>
                <rect x="177" y="35" width="66" height="105" fill="#f72585"/>
                <polygon points="210,0 177,35 243,35" fill="#ffd700"/>
              </svg>
              <div style={{fontSize:52,animation:"fl 3s ease-in-out infinite",filter:"drop-shadow(0 0 18px #ffd700)",marginBottom:10,position:"relative",zIndex:2}}>&#x1F451;</div>
              
              <div style={{fontFamily:"'Dancing Script', cursive", fontSize:"clamp(36px,9vw,52px)",color:"#ffd700",animation:"gl 3s ease-in-out infinite",letterSpacing:2,position:"relative",zIndex:2, lineHeight:1.1}}>Laura Valentina</div>
              <div style={{color:"#ffb3d9",letterSpacing:5,fontSize:14,fontWeight:"bold",textTransform:"uppercase",marginTop:5,marginBottom:8,position:"relative",zIndex:2}}>Dream Castle</div>
              
              <div style={{color:"rgba(255,179,217,0.8)",fontStyle:"italic",fontSize:15,marginBottom:36,letterSpacing:1,position:"relative",zIndex:2}}>Seja tudo o que você quiser ser!</div>
              <button onClick={()=>setScreen("select")} style={{width:240,padding:"18px 0",border:"none",borderRadius:50,background:"linear-gradient(135deg,#f72585,#c77dff,#ffd700)",color:"white",fontSize:16,fontWeight:"bold",letterSpacing:1,cursor:"pointer",boxShadow:"0 8px 30px rgba(247,37,133,0.55)",position:"relative",zIndex:2,marginBottom:14}}>
                Entrar no Castelo Mágico
              </button>
              <div style={{position:"relative",zIndex:2,color:"rgba(255,179,217,0.6)",fontSize:12,fontWeight:"bold",letterSpacing:2}}>12 PERSONAGENS - PONTOS: {points}</div>
            </div>
          )}

          {screen==="select" && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"30px 16px 50px",position:"relative",zIndex:1,animation:"fi .4s ease"}}>
              <div style={{fontFamily:"'Dancing Script', cursive", color:"#ffd700",fontSize:32,marginBottom:4}}>Escolha sua Princesa</div>
              <div style={{color:"#ff85c2",fontStyle:"italic",fontSize:14,marginBottom:22}}>Cada uma tem uma história única</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%",maxWidth:390}}>
                {CHARACTERS.map(c=>(
                  <div key={c.id} onClick={()=>pickChar(c)}
                    style={{background:"linear-gradient(145deg,#250020,#180028)",border:"1px solid rgba(247,37,133,0.3)",borderRadius:16,padding:"14px 6px",cursor:"pointer",textAlign:"center",transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#ffd700";e.currentTarget.style.transform="scale(1.04)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(247,37,133,0.3)";e.currentTarget.style.transform="scale(1)";}}>
                    
                    <svg viewBox="20 40 100 120" style={{width:54,height:64,display:"block",margin:"0 auto 8px"}}>
                      <ellipse cx="70" cy="58" rx="22" ry="22" fill={c.hair}/>
                      <ellipse cx="70" cy="66" rx="18" ry="20" fill={c.skin}/>
                      <path d="M52,90 Q45,120 44,150 L96,150 Q95,120 88,90Z" fill="#f72585"/>
                      <path d="M56,66 Q56,52 70,50 Q84,52 84,66" fill={c.hair}/>
                    </svg>
                    <div style={{color:"#ffd700",fontSize:13,fontWeight:"bold",letterSpacing:1}}>{c.name}</div>
                    <div style={{color:"rgba(255,179,217,0.7)",fontSize:10,marginTop:4,fontWeight:"bold"}}>{c.job}</div>
                  </div>
                ))}
              </div>
              <button onClick={()=>setScreen("home")} style={{marginTop:30,background:"transparent",border:"2px solid rgba(247,37,133,0.6)",color:"#ff85c2",padding:"12px 32px",borderRadius:30,cursor:"pointer",fontSize:14,fontWeight:"bold",letterSpacing:2}}>Voltar</button>
            </div>
          )}

          {screen==="castle" && char && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 14px 50px",position:"relative",zIndex:1}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",maxWidth:400,marginBottom:12}}>
                <div style={{borderLeft:"4px solid #ffd700",padding:"7px 14px",background:"linear-gradient(90deg,rgba(247,37,133,0.2),transparent)",borderRadius:"0 16px 16px 0"}}>
                  <div style={{color:"#ffd700",fontSize:16,fontWeight:"bold",letterSpacing:1}}>{char.name}</div>
                  <div style={{color:"rgba(255,179,217,0.7)",fontSize:11,fontWeight:"bold",letterSpacing:1}}>{char.job}</div>
                </div>
                <div style={{color:"#ffd700",fontSize:16,fontWeight:"bold",letterSpacing:1}}>&#9733; {points}</div>
              </div>

              <div style={{width:200,height:280,position:"relative",marginBottom:14,flexShrink:0}}>
                <div style={{position:"absolute",inset:0,borderRadius:20,background:sceneBg,border:"2px solid rgba(247,37,133,0.4)",transition:"background .5s"}}/>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:10,animation:"df 4s ease-in-out infinite"}}>
                  <Doll skin={char.skin} hairC={hairC} dress={dress} lip={lip} shadow={shadow} blush={blush} acc={acc} crown={crown} shoes={shoes}/>
                </div>
              </div>

              <button onClick={saveLook} style={{width:"100%",maxWidth:400,padding:"14px",marginBottom:16,background:"linear-gradient(135deg,#f72585,#c77dff)",border:"none",borderRadius:14,color:"white",fontSize:14,fontWeight:"bold",letterSpacing:1,cursor:"pointer",boxShadow:"0 4px 16px rgba(247,37,133,0.4)"}}>
                Salvar Look  +10 Mágicas
              </button>

              {/* BARRA DE MENU COM SETAS */}
              <div style={{display:"flex", alignItems:"center", gap:4, width:"100%", maxWidth:400, marginBottom:16}}>
                <button onClick={()=>scrollTabs(-1)} style={{background:"none", border:"none", color:"#ffd700", fontSize:20, cursor:"pointer", padding:"0 5px"}}>◁</button>
                <div ref={scrollRef} className="hide-scroll" style={{display:"flex",gap:8,overflowX:"auto",scrollBehavior:"smooth",flex:1}}>
                  {TABS.map(t=>(
                    <button key={t.k} onClick={()=>setTab(t.k)} style={{flexShrink:0,padding:"10px 16px",borderRadius:28,border:"1px solid "+(tab===t.k?"transparent":"rgba(247,37,133,0.4)"),background:tab===t.k?"linear-gradient(135deg,#f72585,#c77dff)":"rgba(247,37,133,0.1)",color:tab===t.k?"white":"#ffb3d9",fontSize:12,fontWeight:"bold",letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap"}}>{t.l}</button>
                  ))}
                </div>
                <button onClick={()=>scrollTabs(1)} style={{background:"none", border:"none", color:"#ffd700", fontSize:20, cursor:"pointer", padding:"0 5px"}}>▷</button>
              </div>

              <div style={panel}>
                {tab==="closet" && <>
                  <SL t="Cor do Vestido"/>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    {DRESS_COLORS.map(({c})=><Swatch key={c} c={c} selected={dress===c} onClick={()=>setDress(c)}/>)}
                  </div>
                  <SL t="Acessórios Reais"/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <Btn active={acc} onClick={()=>setAcc(a=>!a)}>Colar {acc?"(Tirar)":"(Colocar)"}</Btn>
                    <Btn active={crown} onClick={()=>setCrown(c=>!c)}>Coroa {crown?"(Tirar)":"(Colocar)"}</Btn>
                  </div>
                </>}

                {tab==="sapatos" && <>
                  <SL t="Escolha seu Calçado"/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
                    {SHOE_STYLES.map(s=><Btn key={s} active={shoes===s} onClick={()=>setShoes(s)}>{s}</Btn>)}
                  </div>
                </>}

                {tab==="salao" && <>
                  <SL t="Cor do Cabelo"/>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    {HAIR_COLORS.map(({c})=><Swatch key={c} c={c} selected={hairC===c} onClick={()=>setHairC(c)}/>)}
                  </div>
                  <SL t="Penteado"/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                    {HAIR_STYLES.map(h=><Btn key={h} active={hairS===h} onClick={()=>setHairS(h)}>{h}</Btn>)}
                  </div>
                </>}

                {tab==="makeup" && <>
                  <SL t="Cor do Batom"/>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    {LIP_COLORS.map(({c})=><Swatch key={c} c={c} selected={lip===c} onClick={()=>setLip(c)}/>)}
                  </div>
                  <SL t="Sombra dos Olhos"/>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                    {SHADOW_COLORS.map(({c})=><Swatch key={c} c={c} selected={shadow===c} onClick={()=>setShadow(c)}/>)}
                  </div>
                  <SL t="Blush nas Bochechas"/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                    {[{v:"none",l:"Sem"},{v:"soft",l:"Suave"},{v:"strong",l:"Intenso"}].map(({v,l})=>(
                      <Btn key={v} active={blush===v} onClick={()=>setBlush(v)}>{l}</Btn>
                    ))}
                  </div>
                </>}

                {tab==="studio" && <>
                  <SL t="Cenário de Fundo"/>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}}>
                    {SCENES.map(s=><Btn key={s.k} active={scene===s.k} onClick={()=>setScene(s.k)}>{s.l}</Btn>)}
                  </div>
                  <button onClick={saveLook} style={{width:"100%",padding:14,background:"linear-gradient(135deg,#f72585,#ffd700)",border:"none",borderRadius:12,color:"white",fontSize:14,fontWeight:"bold",letterSpacing:1,cursor:"pointer"}}>📸 Tirar Foto Exclusiva</button>
                </>}

                {tab==="galeria" && <>
                  <SL t={"Looks Salvos ("+gallery.length+")"}/>
                  {gallery.length===0 && <div style={{color:"rgba(255,179,217,0.6)",fontStyle:"italic",fontSize:14,textAlign:"center",padding:"20px 0"}}>Nenhum look salvo. Vista sua boneca e salve!</div>}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
                    {gallery.map(lk=>(
                      <div key={lk.id} style={{background:"#2a0025",borderRadius:14,padding:10,border:"1px solid rgba(247,37,133,0.4)",position:"relative"}}>
                        <svg viewBox="20 40 100 120" style={{width:"100%",height:90}}>
                          <ellipse cx="70" cy="58" rx="22" ry="22" fill={lk.hairC}/>
                          <ellipse cx="70" cy="66" rx="18" ry="20" fill={(lk.char&&lk.char.skin)||"#f5c5a3"}/>
                          <path d="M52,90 Q45,120 44,148 L96,148 Q95,120 88,90Z" fill={lk.dress}/>
                        </svg>
                        
                        <div style={{display:"flex", gap:5, marginTop:8}}>
                          <button onClick={()=> {setDress(lk.dress);setHairC(lk.hairC);setHairS(lk.hairS);setLip(lk.lip);setShadow(lk.shadow);setBlush(lk.blush);setAcc(lk.acc);setCrown(lk.crown);setShoes(lk.shoes);setScene(lk.scene);setTab("closet");showToast("Look restaurado!");}} style={{flex:1, background:"#f72585", color:"white", border:"none", borderRadius:6, padding:"6px", fontSize:11, fontWeight:"bold", cursor:"pointer"}}>Vestir</button>
                          <button onClick={(e)=>deleteLook(lk.id, e)} style={{background:"#ff006e", color:"white", border:"none", borderRadius:6, padding:"6px 10px", fontSize:11, fontWeight:"bold", cursor:"pointer"}}>X</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>}

                {tab==="missoes" && <>
                  <SL t="Missões Educativas e Profissões"/>
                  <div style={{color:"rgba(255,179,217,0.7)",fontStyle:"italic",fontSize:13,marginBottom:16}}>Complete as tarefas e aprenda com as personagens!</div>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {MISSIONS.map(m=>(
                      <div key={m.id} onClick={()=>startMission(m)} style={{background:"rgba(247,37,133,0.1)",border:"1px solid rgba(247,37,133,0.3)",borderRadius:14,padding:"14px 16px",cursor:"pointer"}}>
                        <div style={{color:"#ffd700",fontSize:14,fontWeight:"bold",letterSpacing:1,marginBottom:4}}>{m.title}</div>
                        <div style={{color:"rgba(255,179,217,0.8)",fontSize:12, fontWeight:"bold"}}>{m.char} - Ganhe +30 pts</div>
                      </div>
                    ))}
                  </div>
                </>}

                {tab==="jogos" && <>
                  <SL t="Mini Jogos do Castelo"/>
                  <div style={{background:"rgba(247,37,133,0.1)",border:"1px solid rgba(247,37,133,0.3)",borderRadius:14,padding:18,marginBottom:12}}>
                    <div style={{color:"#ffd700",fontSize:16,fontWeight:"bold",marginBottom:6}}>Jogo da Memória</div>
                    <div style={{color:"rgba(255,179,217,0.7)",fontSize:13,marginBottom:14}}>Encontre os pares de cores. Cada par vale 15 pontos!</div>
                    <button onClick={startMemory} style={{width:"100%",padding:12,background:"linear-gradient(135deg,#3a86ff,#c77dff)",border:"none",borderRadius:12,color:"white",fontSize:14,fontWeight:"bold",letterSpacing:1,cursor:"pointer"}}>Jogar Agora</button>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:18}}>
                    <div style={{color:"rgba(255,179,217,0.5)",fontSize:13,fontStyle:"italic",textAlign:"center"}}>Mais mágicas em breve...</div>
                  </div>
                </>}
              </div>

              <button onClick={()=>setScreen("home")} style={{marginTop:24,background:"transparent",border:"2px solid rgba(247,37,133,0.6)",color:"#ff85c2",padding:"12px 32px",borderRadius:30,cursor:"pointer",fontSize:14,fontWeight:"bold",letterSpacing:2}}>Sair do Castelo</button>
            </div>
          )}

          {screen==="mission" && mission && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"34px 18px 50px",position:"relative",zIndex:1,animation:"fi .4s ease",maxWidth:440,margin:"0 auto"}}>
              <div style={{color:"#ffd700",fontSize:18,fontWeight:"bold",letterSpacing:1,textAlign:"center",marginBottom:8}}>{mission.title}</div>
              <div style={{color:"rgba(255,179,217,0.9)",fontSize:14,textAlign:"center",marginBottom:20,lineHeight:1.65}}>Desafio com {mission.char}: {mission.q}</div>
              <div style={panel}>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {mission.opts.map((opt,i)=>{
                    const show = mAns!==null;
                    const isCorr = i===mission.ans;
                    const isSel = mAns===i;
                    return (
                      <div key={i} onClick={()=>mAns===null&&answerMission(i)} style={{background:show&&isCorr?"rgba(46,196,182,0.2)":show&&isSel?"rgba(204,0,0,0.2)":"rgba(247,37,133,0.1)",border:"2px solid "+(show&&isCorr?"#2ec4b6":show&&isSel?"#cc0000":"rgba(247,37,133,0.3)"),borderRadius:12,padding:"14px 16px",cursor:mAns===null?"pointer":"default",transition:"all .2s",color:show&&isCorr?"#2ec4b6":show&&isSel?"#ff6666":"rgba(255,179,217,0.9)",fontSize:14,fontWeight:"bold"}}>
                        {opt}
                      </div>
                    );
                  })}
                </div>
                {mAns!==null && (
                  <div style={{marginTop:20,padding:16,background:"rgba(255,213,0,0.1)",border:"1px solid rgba(255,213,0,0.4)",borderRadius:14}}>
                    <div style={{color:"#ffd700",fontSize:11,fontWeight:"bold",letterSpacing:3,marginBottom:8}}>VOCÊ APRENDEU!</div>
                    <div style={{color:"rgba(255,179,217,0.9)",fontSize:13,lineHeight:1.65}}>{mission.edu}</div>
                  </div>
                )}
              </div>
              <button onClick={()=>setScreen("castle")} style={{marginTop:24,background:"transparent",border:"2px solid rgba(247,37,133,0.6)",color:"#ff85c2",padding:"12px 32px",borderRadius:30,cursor:"pointer",fontSize:14,fontWeight:"bold",letterSpacing:2}}>{mAns!==null?"Voltar ao Castelo":"Pular Desafio"}</button>
            </div>
          )}

          {screen==="memory" && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"34px 14px 50px",position:"relative",zIndex:1,animation:"fi .4s ease"}}>
              <div style={{color:"#ffd700",fontSize:20,fontWeight:"bold",letterSpacing:1,marginBottom:6}}>Jogo da Memória</div>
              <div style={{color:"rgba(255,179,217,0.8)",fontSize:14,marginBottom:20}}>Pares: {memMatched.length}/8 - Pontos: {points}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,width:"100%",maxWidth:380}}>
                {memCards.map(card=>{
                  const fl = memFlipped.includes(card.id)||memMatched.includes(card.val);
                  return (
                    <div key={card.id} onClick={()=>flipCard(card.id)} style={{height:75,borderRadius:14,cursor:"pointer",background:fl?(MEM_COLORS[card.val]||"#f72585"):"linear-gradient(135deg,#2a003a,#1a0028)",border:"2px solid "+(fl?"rgba(255,255,255,0.4)":"rgba(247,37,133,0.5)"),transition:"all .22s",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold",color:"white",letterSpacing:1}}>
                      {fl?card.val:"?"}
                    </div>
                  );
                })}
              </div>
              {memMatched.length===8 && (
                <div style={{marginTop:24,padding:"16px 26px",background:"rgba(46,196,182,0.15)",border:"2px solid #2ec4b6",borderRadius:16,textAlign:"center"}}>
                  <div style={{color:"#2ec4b6",fontSize:16,fontWeight:"bold",letterSpacing:1}}>Parabéns! Você venceu!</div>
                </div>
              )}
              <div style={{display:"flex",gap:14,marginTop:26}}>
                <button onClick={startMemory} style={{background:"transparent",border:"2px solid rgba(46,196,182,0.6)",color:"#2ec4b6",padding:"12px 24px",borderRadius:28,cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:2}}>Reiniciar</button>
                <button onClick={()=>setScreen("castle")} style={{background:"transparent",border:"2px solid rgba(247,37,133,0.6)",color:"#ff85c2",padding:"12px 24px",borderRadius:28,cursor:"pointer",fontSize:13,fontWeight:"bold",letterSpacing:2}}>Voltar</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
